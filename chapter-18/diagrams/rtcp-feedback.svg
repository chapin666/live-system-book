<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <linearGradient id="senderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <linearGradient id="receiverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="550" fill="#FAFAFA"/>
  
  <!-- 标题 -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">RTCP 反馈循环机制</text>
  
  <!-- 发送端区域 -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="200" height="450" rx="10" fill="url(#senderGrad)" stroke="#2196F3" stroke-width="2"/>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1565C0">发送端 (Sender)</text>
    
    <!-- RTP 发送 -->
    <rect x="20" y="50" width="160" height="60" rx="5" fill="#fff" stroke="#64B5F6" stroke-width="2"/>
    <text x="100" y="75" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1976D2">RTP 数据流</text>
    <text x="100" y="92" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">发送音视频数据包</text>
    <text x="100" y="105" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#888">序列号: 1, 2, 3, 4, 5...</text>
    
    <!-- 发送统计 -->
    <rect x="20" y="125" width="160" height="70" rx="5" fill="#E1F5FE" stroke="#0288D1"/>
    <text x="100" y="145" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#01579B">发送统计</text>
    <text x="30" y="165" font-family="monospace" font-size="9" fill="#333">packets_sent: 1523</text>
    <text x="30" y="180" font-family="monospace" font-size="9" fill="#333">bytes_sent: 2,456,789</text>
    
    <!-- RTCP SR 发送 -->
    <rect x="20" y="210" width="160" height="60" rx="5" fill="#FFECB3" stroke="#FFC107" stroke-width="2"/>
    <text x="100" y="235" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#FF8F00">发送 RTCP SR</text>
    <text x="100" y="252" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">每 5 秒发送一次</text>
    <text x="100" y="265" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#888">包含发送统计信息</text>
    
    <!-- 接收 RTCP RR -->
    <rect x="20" y="285" width="160" height="70" rx="5" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2"/>
    <text x="100" y="310" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2E7D32">接收 RTCP RR</text>
    <text x="100" y="330" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">解析接收端反馈</text>
    <text x="100" y="343" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#888">丢包率、抖动、延迟</text>
    
    <!-- 码率调整 -->
    <rect x="20" y="370" width="160" height="70" rx="5" fill="#FFCDD2" stroke="#EF5350" stroke-width="2"/>
    <text x="100" y="395" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#C62828">自适应调整</text>
    <text x="100" y="415" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">根据反馈调整码率</text>
    <text x="100" y="428" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#888">GCC / 丢包率算法</text>
  </g>
  
  <!-- 网络 -->
  <g transform="translate(280, 80)">
    <text x="30" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#666">网</text>
    <text x="30" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#666">络</text>
    <text x="30" y="40" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#666">传</text>
    <text x="30" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#666">输</text>
    
    <!-- RTP 数据流向右 -->
    <line x1="60" y1="80" x2="160" y2="80" stroke="#2196F3" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="110" y="70" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1565C0">RTP Data</text>
    
    <!-- RTCP RR 向左 -->
    <line x1="160" y1="320" x2="60" y2="320" stroke="#4CAF50" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="110" y="340" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2E7D32">RTCP RR</text>
    
    <!-- RTCP SR 向右 -->
    <line x1="60" y1="240" x2="160" y2="240" stroke="#FF9800" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="110" y="230" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#EF6C00">RTCP SR</text>
  </g>
  
  <!-- 接收端区域 -->
  < transform="translate(470, 60)">
    <rect x="0" y="0" width="200" height="450" rx="10" fill="url(#receiverGrad)" stroke="#4CAF50" stroke-width="2"/>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2E7D32">接收端 (Receiver)</text>
    
    <!-- RTP 接收 -->
    <rect x="20" y="50" width="160" height="60" rx="5" fill="#fff" stroke="#81C784" stroke-width="2"/>
    <text x="100" y="75" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#388E3C">接收 RTP 数据</text>
    <text x="100" y="92" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">解析序列号和时间戳</text>
    <text x="100" y="105" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#888">检测丢包和乱序</text>
    
    <!-- 接收统计 -->
    <rect x="20" y="125" width="160" height="100" rx="5" fill="#F1F8E9" stroke="#7CB342"/>
    <text x="100" y="145" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#33691E">接收统计计算</text>
    <text x="30" y="168" font-family="monospace" font-size="9" fill="#333">expected: 1520</text>
    <text x="30" y="183" font-family="monospace" font-size="9" fill="#333">received: 1485</text>
    <text x="30" y="198" font-family="monospace" font-size="9" fill="#D32F2F">lost: 35 (2.3%)</text>
    <text x="30" y="213" font-family="monospace" font-size="9" fill="#333">jitter: 23ms</text>
    
    <!-- 接收 RTCP SR -->
    <rect x="20" y="240" width="160" height="50" rx="5" fill="#FFF3E0" stroke="#FFB74D"/>
    <text x="100" y="262" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#E65100">接收 RTCP SR</text>
    <text x="100" y="280" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">获取发送端统计</text>
    
    <!-- 生成 RTCP RR -->
    <rect x="20" y="305" width="160" height="70" rx="5" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2"/>
    <text x="100" y="330" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2E7D32">生成 RTCP RR</text>
    <text x="100" y="350" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">打包统计信息</text>
    <text x="100" y="363" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#888">丢包率/抖动/延迟</text>
    
    <!-- JitterBuffer -->
    <rect x="20" y="390" width="160" height="50" rx="5" fill="#E1F5FE" stroke="#0288D1"/>
    <text x="100" y="412" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#01579B">JitterBuffer</text>
    <text x="100" y="430" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">平滑抖动后解码</text>
  </g>
  
  <!-- 反馈循环说明 -->
  <g transform="translate(690, 60)">
    <rect x="0" y="0" width="180" height="450" rx="10" fill="#fff" stroke="#9E9E9E" stroke-width="1"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">反馈循环</text>
    
    <text x="90" y="55" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">闭环控制系统</text>
    
    <g transform="translate(15, 80)">
      <rect x="0" y="0" width="150" height="50" rx="5" fill="#E3F2FD"/>
      <text x="75" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#1565C0">发送端</text>
      <text x="75" y="38" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">发送 RTP 数据</text>
    </g>
    
    <text x="90" y="145" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#999">↓</text>
    
    <g transform="translate(15, 160)">
      <rect x="0" y="0" width="150" height="50" rx="5" fill="#E8F5E9"/>
      <text x="75" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#2E7D32">接收端</text>
      <text x="75" y="38" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">统计质量指标</text>
    </g>
    
    <text x="90" y="225" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#999">↓</text>
    
    <g transform="translate(15, 240)">
      <rect x="0" y="0" width="150" height="50" rx="5" fill="#FFF3E0"/>
      <text x="75" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#E65100">RTCP 反馈</text>
      <text x="75" y="38" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">报告丢包和抖动</text>
    </g>
    
    <text x="90" y="305" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#999">↓</text>
    
    <g transform="translate(15, 320)">
      <rect x="0" y="0" width="150" height="50" rx="5" fill="#FFEBEE"/>
      <text x="75" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#C62828">自适应调整</text>
      <text x="75" y="38" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">调整码率和质量</text>
    </g>
    
    <text x="90" y="385" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#999">↑</text>
    
    <g transform="translate(15, 400)">
      <rect x="0" y="0" width="150" height="35" rx="5" fill="#F3E5F5"/>
      <text x="75" y="22" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7B1FA2">循环往复，持续优化</text>
    </g>
  </g>
  
  <!-- 底部关键指标 -->
  <g transform="translate(50, 520)">
    <text x="400" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">关键反馈指标：丢包率 | 抖动(Jitter) | 往返延迟(RTT) | 接收码率</text>
  </g>
</svg>