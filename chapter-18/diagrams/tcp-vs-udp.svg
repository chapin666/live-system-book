<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <linearGradient id="tcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <linearGradient id="udpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="500" fill="#FAFAFA"/>
  
  <!-- 标题 -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#333">TCP vs UDP 特性对比</text>
  
  <!-- TCP 区域 -->
  <rect x="50" y="60" width="380" height="400" rx="10" fill="url(#tcpGrad)" stroke="#2196F3" stroke-width="2"/>
  <text x="240" y="90" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565C0">TCP</text>
  <text x="240" y="110" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Transmission Control Protocol</text>
  
  <!-- UDP 区域 -->
  <rect x="470" y="60" width="380" height="400" rx="10" fill="url(#udpGrad)" stroke="#4CAF50" stroke-width="2"/>
  <text x="660" y="90" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2E7D32">UDP</text>
  <text x="660" y="110" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">User Datagram Protocol</text>
  
  <!-- TCP 特性列表 -->
  <g transform="translate(70, 140)">
    <rect x="0" y="0" width="340" height="45" rx="5" fill="#fff" stroke="#90CAF9"/>
    <text x="170" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1565C0">面向连接</text>
    <text x="170" y="38" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">三次握手建立连接，四次挥手断开</text>
    
    <rect x="0" y="55" width="340" height="45" rx="5" fill="#fff" stroke="#90CAF9"/>
    <text x="170" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1565C0">可靠传输</text>
    <text x="170" y="93" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">确认、重传、按序交付</text>
    
    <rect x="0" y="110" width="340" height="45" rx="5" fill="#fff" stroke="#90CAF9"/>
    <text x="170" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1565C0">拥塞控制</text>
    <text x="170" y="148" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">滑动窗口、慢启动、拥塞避免</text>
    
    <rect x="0" y="165" width="340" height="45" rx="5" fill="#fff" stroke="#90CAF9"/>
    <text x="170" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1565C0">队头阻塞</text>
    <text x="170" y="203" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#E53935">一个丢包阻塞后续所有数据</text>
    
    <rect x="0" y="220" width="340" height="45" rx="5" fill="#fff" stroke="#90CAF9"/>
    <text x="170" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1565C0">头部开销</text>
    <text x="170" y="258" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">20-60 字节</text>
    
    <rect x="0" y="275" width="340" height="45" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
    <text x="170" y="295" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1565C0">适用场景</text>
    <text x="170" y="313" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">文件传输、网页浏览、数据库</text>
  </g>
  
  <!-- UDP 特性列表 -->
  <g transform="translate(490, 140)">
    <rect x="0" y="0" width="340" height="45" rx="5" fill="#fff" stroke="#A5D6A7"/>
    <text x="170" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2E7D32">无连接</text>
    <text x="170" y="38" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">直接发送，无需握手</text>
    
    <rect x="0" y="55" width="340" height="45" rx="5" fill="#fff" stroke="#A5D6A7"/>
    <text x="170" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2E7D32">尽力而为</text>
    <text x="170" y="93" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">不保证到达、不保证顺序</text>
    
    <rect x="0" y="110" width="340" height="45" rx="5" fill="#fff" stroke="#A5D6A7"/>
    <text x="170" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2E7D32">无拥塞控制</text>
    <text x="170" y="148" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">应用层自主控制发送速率</text>
    
    <rect x="0" y="165" width="340" height="45" rx="5" fill="#fff" stroke="#A5D6A7"/>
    <text x="170" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2E7D32">无队头阻塞</text>
    <text x="170" y="203" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#43A047">独立传输，互不影响</text>
    
    <rect x="0" y="220" width="340" height="45" rx="5" fill="#fff" stroke="#A5D6A7"/>
    <text x="170" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2E7D32">头部开销</text>
    <text x="170" y="258" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#43A047">仅 8 字节</text>
    
    <rect x="0" y="275" width="340" height="45" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
    <text x="170" y="295" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2E7D32">适用场景</text>
    <text x="170" y="313" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">实时音视频、在线游戏、DNS</text>
  </g>
  
  <!-- 底部对比表 -->
  <g transform="translate(50, 420)">
    <text x="400" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">实时通信选择：UDP + 应用层控制 = 最佳方案</text>
  </g>
</svg>