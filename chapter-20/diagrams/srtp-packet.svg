<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <!-- Background -->
  <rect width="900" height="350" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">SRTP 数据包结构</text>
  
  
  <!-- RTP Packet Structure (Top) -->
  <g transform="translate(50, 60)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#666">标准 RTP 包:</text>
    
    
    <!-- RTP Header -->
    <rect x="0" y="10" width="400" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    
    <text x="200" y="30" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">RTP Header (12+ bytes)</text>
    
    <text x="50" y="50" text-anchor="middle" font-size="9" fill="#333">V=2|P|X|CC</text>
    
    <text x="150" y="50" text-anchor="middle" font-size="9" fill="#333">M|PT</text>
    
    <text x="250" y="50" text-anchor="middle" font-size="9" fill="#333">Sequence</text>
    
    <text x="350" y="50" text-anchor="middle" font-size="9" fill="#333">Timestamp</text>
    
    
    <!-- RTP Payload -->
    
    <rect x="400" y="10" width="400" height="50" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
    
    <text x="600" y="30" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">RTP Payload</text>
    
    <text x="600" y="50" text-anchor="middle" font-size="9" fill="#333">音视频数据 (H264/VP8/Opus)</text>
  </g>
  
  
  <!-- SRTP Packet Structure (Bottom) -->
  <g transform="translate(50, 160)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#666">SRTP 加密包:</text>
    
    
    <!-- SRTP Header (same as RTP) -->
    <rect x="0" y="10" width="400" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    
    <text x="200" y="30" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">RTP Header (明文，不加密)</text>
    
    <text x="200" y="50" text-anchor="middle" font-size="9" fill="#666">用于路由和重放保护</text>
    
    
    <!-- Encrypted Payload -->
    
    <rect x="400" y="10" width="350" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    
    
    <text x="575" y="30" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Encrypted Payload</text>
    
    <text x="575" y="50" text-anchor="middle" font-size="9" fill="#333">AES-CTR/AES-GCM 加密</text>
    
    
    <!-- Authentication Tag -->
    
    <rect x="750" y="10" width="100" height="50" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    
    
    <text x="800" y="30" text-anchor="middle" font-size="10" font-weight="bold" fill="#c2185b">Auth Tag</text>
    
    <text x="800" y="48" text-anchor="middle" font-size="9" fill="#333">HMAC-SHA1</text>
  </g>
  
  
  <!-- Arrow showing transformation -->
  <g transform="translate(50, 130)">
    <text x="400" y="10" text-anchor="middle" font-size="11" fill="#666">↓ 加密转换</text>
  </g>
  
  
  <!-- Key info -->
  <g transform="translate(50, 250)">
    <rect width="800" height="80" fill="#f5f5f5" stroke="#ddd" stroke-width="1" rx="5"/>
    
    
    <text x="10" y="25" font-size="11" font-weight="bold" fill="#333">SRTP 密钥 (从 DTLS 握手导出):</text>
    
    
    <text x="20" y="50" font-size="10" fill="#333">• 发送密钥 (SRTP Master Key + Salt): 用于加密本地发送的数据</text>
    
    <text x="20" y="68" font-size="10" fill="#333">• 接收密钥 (SRTP Master Key + Salt): 用于解密远端收到的数据</text>
  </g>
  
  
  <!-- Encryption algorithms -->
  <g transform="translate(50, 320)">
    <text x="0" y="15" font-size="11" font-weight="bold" fill="#333">加密算法:</text>
    
    <text x="80" y="15" font-size="10" fill="#666">• AES-128-CTR (RFC 3711) - 传统模式，需要HMAC认证</text>
    
    <text x="450" y="15" font-size="10" fill="#666">• AES-128-GCM (RFC 7714) - 认证加密，性能更好</text>
  </g>
</svg>