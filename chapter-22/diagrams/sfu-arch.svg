<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="400" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">SFU 服务器架构</text>
  
  <!-- Clients -->
  <rect x="50" y="60" width="120" height="280" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="110" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Clients</text>
  
  <rect x="70" y="100" width="80" height="35" rx="4" fill="#fff" stroke="#64b5f6"/>
  <text x="110" y="122" text-anchor="middle" font-size="10" fill="#1976d2">Alice</text>
  
  <rect x="70" y="145" width="80" height="35" rx="4" fill="#fff" stroke="#64b5f6"/>
  <text x="110" y="167" text-anchor="middle" font-size="10" fill="#1976d2">Bob</text>
  
  <rect x="70" y="190" width="80" height="35" rx="4" fill="#fff" stroke="#64b5f6"/>
  <text x="110" y="212" text-anchor="middle" font-size="10" fill="#1976d2">Charlie</text>
  
  <rect x="70" y="235" width="80" height="35" rx="4" fill="#fff" stroke="#64b5f6"/>
  <text x="110" y="257" text-anchor="middle" font-size="10" fill="#1976d2">David</text>
  
  <rect x="70" y="280" width="80" height="45" rx="4" fill="#fff3e0" stroke="#ffa726"/>
  <text x="110" y="300" text-anchor="middle" font-size="9" fill="#ef6c00">...更多</text>
  <text x="110" y="315" text-anchor="middle" font-size="9" fill="#ef6c00">50+ 人</text>
  
  <!-- Arrow to SFU -->
  <line x1="170" y1="170" x2="200" y2="170" stroke="#1976d2" stroke-width="3" marker-end="url(#arrowblue)"/>
  <text x="185" y="160" font-size="9" fill="#666">发布</text>
  
  <line x1="200" y1="230" x2="170" y2="230" stroke="#388e3c" stroke-width="3" marker-end="url(#arrowgreen)"/>
  <text x="175" y="255" font-size="9" fill="#666">订阅</text>
  
  <!-- SFU Server Box -->
  <rect x="200" y="55" width="450" height="290" rx="10" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="2"/>
  <text x="425" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#424242">SFU Server</text>
  
  <!-- Signaling Layer -->
  <rect x="220" y="95" width="410" height="55" rx="6" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="2"/>
  <text x="245" y="115" font-size="11" font-weight="bold" fill="#3f51b5">信令层 Signaling</text>
  <rect x="230" y="125" width="100" height="20" rx="3" fill="#fff" stroke="#7986cb"/>
  <text x="280" y="139" text-anchor="middle" font-size="9" fill="#3f51b5">WebSocket</text>
  <rect x="340" y="125" width="80" height="20" rx="3" fill="#fff" stroke="#7986cb"/>
  <text x="380" y="139" text-anchor="middle" font-size="9" fill="#3f51b5">HTTP</text>
  <rect x="430" y="125" width="90" height="20" rx="3" fill="#fff" stroke="#7986cb"/>
  <text x="475" y="139" text-anchor="middle" font-size="9" fill="#3f51b5">gRPC</text>
  <rect x="530" y="125" width="90" height="20" rx="3" fill="#fff" stroke="#7986cb"/>
  <text x="575" y="139" text-anchor="middle" font-size="9" fill="#3f51b5">Room Mgmt</text>
  
  <!-- Arrow down -->
  <line x1="425" y1="150" x2="425" y2="165" stroke="#9e9e9e" stroke-width="2"/>
  
  <!-- Router Layer -->
  <rect x="220" y="165" width="410" height="75" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="245" y="185" font-size="11" font-weight="bold" fill="#e65100">路由层 Router</text>
  
  <rect x="230" y="195" width="120" height="35" rx="3" fill="#fff" stroke="#ffb74d"/>
  <text x="290" y="210" text-anchor="middle" font-size="9" fill="#e65100">Publisher</text>
  <text x="290" y="223" text-anchor="middle" font-size="8" fill="#f57c00">发布者管理</text>
  
  <rect x="365" y="195" width="120" height="35" rx="3" fill="#fff" stroke="#ffb74d"/>
  <text x="425" y="210" text-anchor="middle" font-size="9" fill="#e65100">Subscriber</text>
  <text x="425" y="223" text-anchor="middle" font-size="8" fill="#f57c00">订阅者管理</text>
  
  <rect x="500" y="195" width="120" height="35" rx="3" fill="#fff" stroke="#ffb74d"/>
  <text x="560" y="210" text-anchor="middle" font-size="9" fill="#e65100">Track Mgmt</text>
  <text x="560" y="223" text-anchor="middle" font-size="8" fill="#f57c00">轨道管理</text>
  
  <!-- Arrow down -->
  <line x1="425" y1="240" x2="425" y2="250" stroke="#9e9e9e" stroke-width="2"/>
  
  <!-- Transport Layer -->
  <rect x="220" y="250" width="410" height="40" rx="6" fill="#e0f2f1" stroke="#009688" stroke-width="2"/>
  <text x="245" y="268" font-size="11" font-weight="bold" fill="#00695c">传输层 Transport</text>
  <rect x="360" y="260" width="70" height="22" rx="3" fill="#fff" stroke="#4db6ac"/>
  <text x="395" y="275" text-anchor="middle" font-size="9" fill="#00695c">ICE</text>
  <rect x="440" y="260" width="70" height="22" rx="3" fill="#fff" stroke="#4db6ac"/>
  <text x="475" y="275" text-anchor="middle" font-size="9" fill="#00695c">DTLS</text>
  <rect x="520" y="260" width="90" height="22" rx="3" fill="#fff" stroke="#4db6ac"/>
  <text x="565" y="275" text-anchor="middle" font-size="9" fill="#00695c">SRTP</text>
  
  <!-- RTP Engine -->
  <rect x="220" y="300" width="410" height="35" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
  <text x="240" y="322" font-size="11" font-weight="bold" fill="#c2185b">RTP 转发引擎</text>
  <text x="420" y="322" font-size="10" fill="#e91e63">只转发，不解码 / 不编码</text>
  
  <!-- Stats -->
  <rect x="580" y="60" width="110" height="100" rx="6" fill="#fff" stroke="#9e9e9e" stroke-width="1"/>
  <text x="635" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#424242">统计</text>
  <text x="590" y="100" font-size="9" fill="#666">转发包数</text>
  <text x="590" y="115" font-size="9" fill="#666">转发字节</text>
  <text x="590" y="130" font-size="9" fill="#666">丢包率</text>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
</svg>