<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    
    <linearGradient id="sfuGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    
    <linearGradient id="routerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="600" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">
    SFU Server Architecture
  </text>
  
  <!-- Clients Section -->
  <rect x="30" y="50" width="180" height="520" rx="8" fill="url(#clientGrad)" stroke="#1976d2" stroke-width="2"/>
  <text x="120" y="75" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">
    Clients
  </text>
  
  <!-- Client A -->
  <rect x="50" y="90" width="140" height="70" rx="6" fill="white" stroke="#1976d2" stroke-width="1"/>
  <text x="120" y="110" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Client A</text>
  <text x="120" y="128" text-anchor="middle" font-family="Arial" font-size="9" fill="#4caf50">↑ Publish Audio</text>
  <text x="120" y="142" text-anchor="middle" font-family="Arial" font-size="9" fill="#4caf50">↑ Publish Video</text>
  
  <!-- Client B -->
  <rect x="50" y="180" width="140" height="70" rx="6" fill="white" stroke="#1976d2" stroke-width="1"/>
  <text x="120" y="200" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Client B</text>
  <text x="120" y="218" text-anchor="middle" font-family="Arial" font-size="9" fill="#4caf50">↑ Publish Audio</text>
  <text x="120" y="232" text-anchor="middle" font-family="Arial" font-size="9" fill="#4caf50">↑ Publish Video</text>
  
  <!-- Client C -->
  <rect x="50" y="270" width="140" height="70" rx="6" fill="white" stroke="#1976d2" stroke-width="1"/>
  <text x="120" y="290" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Client C</text>
  <text x="120" y="308" text-anchor="middle" font-family="Arial" font-size="9" fill="#4caf50">↑ Publish Audio</text>
  <text x="120" y="322" text-anchor="middle" font-family="Arial" font-size="9" fill="#4caf50">↑ Publish Video</text>
  
  <!-- Client D -->
  <rect x="50" y="360" width="140" height="70" rx="6" fill="white" stroke="#1976d2" stroke-width="1"/>
  <text x="120" y="380" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Client D</text>
  <text x="120" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#4caf50">↑ Publish Audio</text>
  <text x="120" y="412" text-anchor="middle" font-family="Arial" font-size="9" fill="#4caf50">↑ Publish Video</text>
  
  <!-- Client E -->
  <rect x="50" y="450" width="140" height="70" rx="6" fill="white" stroke="#1976d2" stroke-width="1"/>
  <text x="120" y="470" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Client E</text>
  <text x="120" y="488" text-anchor="middle" font-family="Arial" font-size="9" fill="#4caf50">↑ Publish Audio</text>
  <text x="120" y="502" text-anchor="middle" font-family="Arial" font-size="9" fill="#4caf50">↑ Publish Video</text>
  
  <!-- SFU Server Section -->
  <rect x="240" y="50" width="630" height="520" rx="8" fill="url(#sfuGrad2)" stroke="#43a047" stroke-width="2"/>
  <text x="555" y="75" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32">
    SFU Server
  </text>
  
  <!-- Signaling Layer -->
  <rect x="260" y="90" width="590" height="70" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
  <text x="555" y="110" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Signaling Layer (WebSocket / HTTP)</text>
  <rect x="280" y="120" width="120" height="30" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
  <text x="340" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Join/Leave</text>
  
  <rect x="420" y="120" width="120" height="30" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
  <text x="480" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Publish/Subscribe</text>
  
  <rect x="560" y="120" width="120" height="30" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
  <text x="620" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">SDP Exchange</text>
  
  <rect x="700" y="120" width="130" height="30" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
  <text x="765" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Room Management</text>
  
  <!-- Room Manager -->
  <rect x="260" y="170" width="200" height="60" rx="6" fill="#e1f5fe" stroke="#0288d1" stroke-width="1"/>
  <text x="360" y="190" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#01579b">Room Manager</text>
  <text x="360" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">• Multiple rooms</text>
  <text x="360" y="222" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">• Participant lifecycle</text>
  
  <!-- Peer Connections -->
  <rect x="480" y="170" width="200" height="60" rx="6" fill="#e1f5fe" stroke="#0288d1" stroke-width="1"/>
  <text x="580" y="190" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#01579b">Peer Connections</text>
  <text x="580" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">• One per client</text>
  <text x="580" y="222" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">• ICE/DTLS/SRTP</text>
  
  <!-- Bandwidth Controller -->
  <rect x="700" y="170" width="150" height="60" rx="6" fill="#e1f5fe" stroke="#0288d1" stroke-width="1"/>
  <text x="775" y="190" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#01579b">GCC Controller</text>
  <text x="775" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">• Bandwidth estimation</text>
  <text x="775" y="222" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">• Rate allocation</text>
  
  <!-- RTP Router -->
  <rect x="260" y="245" width="590" height="130" rx="6" fill="url(#routerGrad)" stroke="#f57c00" stroke-width="2"/>
  <text x="555" y="265" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">RTP Routing Engine (Core)</text>
  
  <!-- Routing Table -->
  <rect x="280" y="280" width="250" height="80" rx="4" fill="white" stroke="#f57c00" stroke-width="1"/>
  <text x="405" y="298" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Routing Table</text>
  <text x="290" y="315" font-family="Arial" font-size="8" fill="#666">SSRC → Publisher</text>
  <text x="290" y="328" font-family="Arial" font-size="8" fill="#666">       → Subscribers[]</text>
  <text x="290" y="341" font-family="Arial" font-size="8" fill="#666">       → Quality Layer</text>
  
  <!-- Simulcast Handler -->
  <rect x="550" y="280" width="130" height="80" rx="4" fill="white" stroke="#f57c00" stroke-width="1"/>
  <text x="615" y="298" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Simulcast</text>
  <text x="615" y="315" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Layer selection</text>
  <text x="615" y="328" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">based on:</text>
  <text x="615" y="341" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">• Viewport size</text>
  <text x="615" y="352" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">• Bandwidth</text>
  
  <!-- Forwarder -->
  <rect x="700" y="280" width="130" height="80" rx="4" fill="white" stroke="#f57c00" stroke-width="1"/>
  <text x="765" y="298" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">RTP Forwarder</text>
  <text x="765" y="315" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Parse RTP header</text>
  <text x="765" y="328" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Route to subs</text>
  <text x="765" y="341" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">NO decode/encode</text>
  
  <!-- Track Management -->
  <rect x="260" y="390" width="590" height="80" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
  <text x="555" y="410" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">Track Management</text>
  
  <rect x="280" y="425" width="160" height="35" rx="4" fill="white" stroke="#7b1fa2" stroke-width="1"/>
  <text x="360" y="442" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Audio Tracks</text>
  <rect x="460" y="425" width="160" height="35" rx="4" fill="white" stroke="#7b1fa2" stroke-width="1"/>
  <text x="540" y="442" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Video Tracks</text>
  <rect x="640" y="425" width="190" height="35" rx="4" fill="white" stroke="#7b1fa2" stroke-width="1"/>
  <text x="735" y="442" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Subscriptions</text>
  
  <!-- Statistics -->
  <rect x="260" y="480" width="590" height="70" rx="6" fill="#eceff1" stroke="#546e7a" stroke-width="1"/>
  <text x="555" y="500" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#37474f">Statistics & Monitoring</text>
  
  <rect x="280" y="515" width="120" height="25" rx="4" fill="white" stroke="#546e7a" stroke-width="1"/>
  <text x="340" y="532" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Packets/sec</text>
  
  <rect x="420" y="515" width="120" height="25" rx="4" fill="white" stroke="#546e7a" stroke-width="1"/>
  <text x="480" y="532" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Bitrate</text>
  
  <rect x="560" y="515" width="120" height="25" rx="4" fill="white" stroke="#546e7a" stroke-width="1"/>
  <text x="620" y="532" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Loss Rate</text>
  
  <rect x="700" y="515" width="130" height="25" rx="4" fill="white" stroke="#546e7a" stroke-width="1"/>
  <text x="765" y="532" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">RTT</text>
  
  <!-- Connection Arrows -->
  <line x1="190" y1="125" x2="250" y2="125" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="215" x2="250" y2="215" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="305" x2="250" y2="305" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="395" x2="250" y2="395" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="485" x2="250" y2="485" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Downstream arrows (return) -->
  <line x1="250" y1="135" x2="190" y2="135" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="250" y1="225" x2="190" y2="225" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="250" y1="315" x2="190" y2="315" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="250" y1="405" x2="190" y2="405" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="250" y1="495" x2="190" y2="495" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow)"/
