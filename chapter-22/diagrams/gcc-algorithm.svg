<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">GCC (Google Congestion Control) 架构</text>
  
  <!-- Sender Side Box -->
  <rect x="50" y="50" width="330" height="350" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="215" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">发送端</text>
  
  <!-- Encoder -->
  <rect x="70" y="90" width="120" height="50" rx="6" fill="#fff" stroke="#64b5f6" stroke-width="2"/>
  <text x="130" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">视频编码器</text>
  <text x="130" y="128" text-anchor="middle" font-size="9" fill="#666">目标码率</text>
  
  <!-- Send Side Estimator -->
  <rect x="210" y="90" width="150" height="80" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="285" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">发送端估计器</text>
  <text x="220" y="132" font-size="9" fill="#f57c00">基于丢包率估计</text>
  <text x="220" y="148" font-size="9" fill="#f57c00">丢包 < 2%: 增加 5%</text>
  <text x="220" y="162" font-size="9" fill="#f57c00">丢包 > 10%: 降低</text>
  
  <!-- Min Box -->
  <rect x="130" y="200" width="140" height="50" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
  <text x="200" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#c2185b">取最小值</text>
  <text x="200" y="240" text-anchor="middle" font-size="10" fill="#e91e63">min(发送端, 接收端)</text>
  
  <!-- Arrow from encoder to min -->
  <line x1="130" y1="140" x2="160" y2="200" stroke="#1976d2" stroke-width="2"/>
  
  <!-- Arrow from estimator to min -->
  <line x1="250" y1="170" x2="210" y2="200" stroke="#ff9800" stroke-width="2"/>
  
  <!-- Arrow from min to encoder -->
  <path d="M 200 200 L 200 180 L 130 160" stroke="#e91e63" stroke-width="2" fill="none" marker-end="url(#arrowpink)"/>
  
  <!-- Arrow down from min -->
  <line x1="200" y1="250" x2="200" y2="280" stroke="#9e9e9e" stroke-width="2" marker-end="url(#arrowgray)"/>
  
  <!-- RTCP Feedback Box -->
  <rect x="100" y="280" width="200" height="50" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="200" y="300" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">RTCP 反馈</text>
  <text x="200" y="318" text-anchor="middle" font-size="9" fill="#388e3c">Receiver Report + TransportCC</text>
  
  <!-- Arrow to receiver -->
  <line x1="300" y1="305" x2="500" y2="305" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowgreen)"/>
  
  <!-- Receiver Side Box -->
  <rect x="420" y="50" width="330" height="350" rx="10" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="585" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">接收端</text>
  
  <!-- Packet Arrival -->
  <rect x="440" y="90" width="140" height="60" rx="6" fill="#fff" stroke="#81c784" stroke-width="2"/>
  <text x="510" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">包到达时间</text>
  <text x="450" y="132" font-size="9" fill="#4caf50">记录发送/到达时间差</text>
  <text x="450" y="145" font-size="9" fill="#4caf50">计算延迟变化趋势</text>
  
  <!-- Kalman Filter -->
  <rect x="600" y="90" width="130" height="60" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="665" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">卡尔曼滤波</text>
  <text x="665" y="135" text-anchor="middle" font-size="9" color="#f57c00">平滑延迟估计</text>
  
  <!-- Arrow between arrival and kalman -->
  <line x1="580" y1="120" x2="600" y2="120" stroke="#9e9e9e" stroke-width="2"/>
  
  <!-- Overuse Detector -->
  <rect x="520" y="170" width="160" height="70" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
  <text x="600" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">拥塞检测器</text>
  <text x="530" y="215" font-size="9" fill="#d32f2f">延迟 > 阈值: 拥塞</text>
  <text x="530" y="230" font-size="9" fill="#d32f2f">延迟 < -阈值: 空闲</text>
  
  <!-- Arrow from kalman to overuse -->
  <line x1="665" y1="150" x2="665" y2="160" x3="600" y3="170" stroke="#f44336" stroke-width="2"/>
  
  <!-- Rate Controller -->
  <rect x="520" y="260" width="160" height="60" rx="6" fill="#e1f5fe" stroke="#03a9f4" stroke-width="2"/>
  <text x="600" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#0277bd">码率控制器</text>
  <text x="600" y="305" text-anchor="middle" font-size="9" fill="#0288d1">拥塞→降速 空闲→提速</text>
  
  <!-- Arrow from overuse to rate -->
  <line x1="600" y1="240" x2="600" y2="260" stroke="#03a9f4" stroke-width="2"/>
  
  <!-- Arrow back to sender -->
  <line x1="520" y1="290" x2="420" y2="290" stroke="#03a9f4" stroke-width="2" marker-end="url(#arrowblue2)"/>
  <text x="470" y="280" font-size="10" fill="#0277bd">目标码率</text>
  
  <!-- Legend -->
  <rect x="50" y="410" width="700" height="5" fill="none"/>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowpink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e91e63"/>
    </marker>
    <marker id="arrowgray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#9e9e9e"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4caf50"/>
    </marker>
    <marker id="arrowblue2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#03a9f4"/>
    </marker>
  </defs>
</svg>