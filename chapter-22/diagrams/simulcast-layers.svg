<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="380" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Simulcast 多路质量分层</text>
  
  <!-- Sender -->
  <rect x="50" y="60" width="150" height="260" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="125" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">发送者 (Alice)</text>
  
  <!-- High Layer -->
  <rect x="70" y="100" width="110" height="65" rx="4" fill="#fff" stroke="#f44336" stroke-width="2"/>
  <text x="125" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">高清层 (L0)</text>
  <text x="125" y="140" text-anchor="middle" font-size="10" fill="#666">1080p @ 2Mbps</text>
  <text x="125" y="155" text-anchor="middle" font-size="9" fill="#999">SSRC: 1111</text>
  
  <!-- Medium Layer -->
  <rect x="70" y="175" width="110" height="65" rx="4" fill="#fff" stroke="#ff9800" stroke-width="2"/>
  <text x="125" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#ef6c00">标清层 (L1)</text>
  <text x="125" y="215" text-anchor="middle" font-size="10" fill="#666">540p @ 500Kbps</text>
  <text x="125" y="230" text-anchor="middle" font-size="9" fill="#999">SSRC: 2222</text>
  
  <!-- Low Layer -->
  <rect x="70" y="250" width="110" height="60" rx="4" fill="#fff" stroke="#4caf50" stroke-width="2"/>
  <text x="125" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">低清层 (L2)</text>
  <text x="125" y="288" text-anchor="middle" font-size="10" fill="#666">270p @ 150Kbps</text>
  <text x="125" y="302" text-anchor="middle" font-size="9" fill="#999">SSRC: 3333</text>
  
  <!-- SFU -->
  <rect x="280" y="80" width="140" height="220" rx="8" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="2"/>
  <text x="350" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#424242">SFU</text>
  <text x="350" y="125" text-anchor="middle" font-size="10" fill="#757575">选择性转发</text>
  
  <!-- Arrows from sender to SFU -->
  <line x1="180" y1="132" x2="280" y2="132" stroke="#f44336" stroke-width="2"/>
  <line x1="180" y1="207" x2="280" y2="207" stroke="#ff9800" stroke-width="2"/>
  <line x1="180" y1="280" x2="280" y2="280" stroke="#4caf50" stroke-width="2"/>
  
  <!-- Subscriber selection -->
  <rect x="490" y="60" width="190" height="90" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="585" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">大屏用户 (Bob)</text>
  <text x="505" y="105" font-size="10" fill="#388e3c">窗口：1920x1080</text>
  <text x="505" y="120" font-size="10" fill="#388e3c">带宽：5Mbps</text>
  <text x="505" y="138" font-size="11" font-weight="bold" fill="#c62828">订阅：高清层 ↑</text>
  
  <rect x="490" y="160" width="190" height="90" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="585" y="185" text-anchor="middle" font-size="12" font-weight="bold" fill="#ef6c00">中等窗口 (Charlie)</text>
  <text x="505" y="205" font-size="10" fill="#f57c00">窗口：960x540</text>
  <text x="505" y="220" font-size="10" fill="#f57c00">带宽：1Mbps</text>
  <text x="505" y="238" font-size="11" font-weight="bold" fill="#ef6c00">订阅：标清层 ↑</text>
  
  <rect x="490" y="260" width="190" height="100" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
  <text x="585" y="285" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">弱网用户 (David)</text>
  <text x="505" y="305" font-size="10" fill="#d32f2f">窗口：480x270</text>
  <text x="505" y="320" font-size="10" fill="#d32f2f">带宽：200Kbps</text>
  <text x="505" y="338" font-size="11" font-weight="bold" fill="#2e7d32">订阅：低清层 ↑</text>
  
  <!-- Arrows from SFU to subscribers -->
  <line x1="420" y1="105" x2="490" y2="105" stroke="#f44336" stroke-width="3"/>
  <text x="450" y="95" font-size="10" fill="#c62828">2Mbps</text>
  
  <line x1="420" y1="205" x2="490" y2="205" stroke="#ff9800" stroke-width="3"/>
  <text x="450" y="195" font-size="10" fill="#ef6c00">500K</text>
  
  <line x1="420" y1="310" x2="490" y2="310" stroke="#4caf50" stroke-width="3"/>
  <text x="450" y="300" font-size="10" fill="#2e7d32">150K</text>
  
  <!-- Legend -->
  <rect x="280" y="320" width="140" height="50" rx="4" fill="#fff" stroke="#ddd"/>
  <text x="350" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#666">智能选择策略</text>
  <text x="290" y="355" font-size="9" fill="#888">• 窗口大小</text>
  <text x="290" y="368" font-size="9" fill="#888">• 带宽估计</text>
</svg>