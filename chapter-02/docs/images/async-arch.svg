<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">异步播放器架构</text>
  
  <!-- 解码线程框 -->
  <rect x="50" y="60" width="280" height="180" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="190" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">解码线程 (Producer)</text>
  
  <!-- 解码线程内容 -->
  <rect x="70" y="100" width="240" height="30" rx="5" fill="white" stroke="#1976d2"/>
  <text x="190" y="120" text-anchor="middle" font-size="12" fill="#333">打开文件 / 初始化解码器</text>
  
  <rect x="70" y="140" width="240" height="30" rx="5" fill="white" stroke="#1976d2"/>
  <text x="190" y="160" text-anchor="middle" font-size="12" fill="#333">读取 Packet → 解码 Frame</text>
  
  <rect x="70" y="180" width="240" height="40" rx="5" fill="#fff3e0" stroke="#ff9800"/>
  <text x="190" y="200" text-anchor="middle" font-size="12" fill="#333">FrameQueue.push()</text>
  <text x="190" y="215" text-anchor="middle" font-size="10" fill="#666">(队列满时阻塞)</text>
  
  <!-- 主线程框 -->
  <rect x="470" y="60" width="280" height="180" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="610" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#388e3c">主线程 (Consumer + UI)</text>
  
  <!-- 主线程内容 -->
  <rect x="490" y="100" width="240" height="30" rx="5" fill="white" stroke="#388e3c"/>
  <text x="610" y="120" text-anchor="middle" font-size="12" fill="#333">创建 SDL 窗口</text>
  
  <rect x="490" y="140" width="240" height="30" rx="5" fill="white" stroke="#388e3c"/>
  <text x="610" y="160" text-anchor="middle" font-size="12" fill="#333">处理事件 (拖动/按键)</text>
  
  <rect x="490" y="180" width="240" height="40" rx="5" fill="#fff3e0" stroke="#ff9800"/>
  <text x="610" y="200" text-anchor="middle" font-size="12" fill="#333">FrameQueue.pop() → Render</text>
  <text x="610" y="215" text-anchor="middle" font-size="10" fill="#666">(队列空时阻塞)</text>
  
  <!-- 帧队列 -->
  <rect x="340" y="120" width="120" height="60" rx="5" fill="#fce4ec" stroke="#c2185b" stroke-width="2"/>
  <text x="400" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#c2185b">FrameQueue</text>
  <text x="400" y="165" text-anchor="middle" font-size="11" fill="#666">(3-5帧缓冲)</text>
  
  <!-- 箭头 -->
  <!-- 解码线程到队列 -->
  <path d="M310 200 L340 150" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 队列到主线程 -->
  <path d="M460 150 L490 200" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>
  
  <!-- 同步原语说明 -->
  <rect x="50" y="280" width="700" height="180" rx="10" fill="#fafafa" stroke="#ddd"/>
  <text x="400" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">线程同步机制</text>
  
  <!-- mutex -->
  <rect x="70" y="320" width="200" height="120" rx="5" fill="white" stroke="#666"/>
  <text x="170" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">std::mutex</text>
  <text x="170" y="360" text-anchor="middle" font-size="10" fill="#666">保护队列数据</text>
  <text x="170" y="380" text-anchor="middle" font-size="10" fill="#666">lock() / unlock()</text>
  <text x="170" y="400" text-anchor="middle" font-size="10" fill="#666">或 lock_guard</text>
  
  <!-- condition_variable -->
  <rect x="300" y="320" width="200" height="120" rx="5" fill="white" stroke="#666"/>
  <text x="400" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">condition_variable</text>
  <text x="400" y="360" text-anchor="middle" font-size="10" fill="#666">not_full: 队列不满</text>
  <text x="400" y="380" text-anchor="middle" font-size="10" fill="#666">not_empty: 队列非空</text>
  <text x="400" y="400" text-anchor="middle" font-size="10" fill="#666">wait() / notify()</text>
  
  <!-- atomic -->
  <rect x="530" y="320" width="200" height="120" rx="5" fill="white" stroke="#666"/>
  <text x="630" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">std::atomic</text>
  <text x="630" y="360" text-anchor="middle" font-size="10" fill="#666">stopped_ 标志</text>
  <text x="630" y="380" text-anchor="middle" font-size="10" fill="#666">running_ 标志</text>
  <text x="630" y="400" text-anchor="middle" font-size="10" fill="#666">无锁操作</text>
</svg>
