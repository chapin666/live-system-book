<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">同步 vs 异步播放器性能对比</text>
  
  <!-- 左侧面板：同步版 -->
  <rect x="30" y="60" width="350" height="400" rx="10" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="205" y="90" text-anchor="middle" font-size="18" font-weight="bold" fill="#c62828">同步播放器</text>
  
  <!-- 同步版帧率图表 -->
  <rect x="50" y="110" width="310" height="120" rx="5" fill="white" stroke="#ddd"/>
  <text x="205" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">帧率稳定性</text>
  
  <!-- Y轴 -->
  <line x1="70" y1="135" x2="70" y2="215" stroke="#333" stroke-width="1"/>
  <text x="60" y="145" text-anchor="end" font-size="9" fill="#666">30fps</text>
  <text x="60" y="195" text-anchor="end" font-size="9" fill="#666">15fps</text>
  
  <!-- 波动的帧率线 -->
  <polyline points="75,150 110,150 145,150 180,190 215,150 250,150 285,190 320,150" 
            fill="none" stroke="#c62828" stroke-width="2"/>
  
  <!-- I帧标记 -->
  <text x="180" y="210" text-anchor="middle" font-size="9" fill="#c62828">I帧</text>
  <text x="285" y="210" text-anchor="middle" font-size="9" fill="#c62828">I帧</text>
  
  <!-- 同步版指标 -->
  <rect x="50" y="240" width="310" height="200" rx="5" fill="white" stroke="#ddd"/>
  
  <text x="205" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">性能指标</text>
  
  <!-- 指标项 -->
  <rect x="70" y="280" width="270" height="25" rx="3" fill="#ffcdd2"/>
  <text x="80" y="296" font-size="11" fill="#333">最低帧率: 18fps</text>
  
  <rect x="70" y="310" width="270" height="25" rx="3" fill="#ffcdd2"/>
  <text x="80" y="326" font-size="11" fill="#333">卡顿次数: 3次</text>
  
  <rect x="70" y="340" width="270" height="25" rx="3" fill="#ffcdd2"/>
  <text x="80" y="356" font-size="11" fill="#333">拖动窗口: 冻结</text>
  
  <rect x="70" y="370" width="270" height="25" rx="3" fill="#ffcdd2"/>
  <text x="80" y="386" font-size="11" fill="#333">CPU波动: 20-70%</text>
  
  <rect x="70" y="400" width="270" height="25" rx="3" fill="#c8e6c9"/>
  <text x="80" y="416" font-size="11" fill="#333">延迟: 33ms (低)</text>
  
  <!-- 右侧面板：异步版 -->
  <rect x="420" y="60" width="350" height="400" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  
  <text x="595" y="90" text-anchor="middle" font-size="18" font-weight="bold" fill="#2e7d32">异步播放器</text>
  
  <!-- 异步版帧率图表 -->
  <rect x="440" y="110" width="310" height="120" rx="5" fill="white" stroke="#ddd"/>
  
  <text x="595" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">帧率稳定性</text>
  
  <!-- Y轴 -->
  <line x1="460" y1="135" x2="460" y2="215" stroke="#333" stroke-width="1"/>
  <text x="450" y="145" text-anchor="end" font-size="9" fill="#666">30fps</text>
  <text x="450" y="195" text-anchor="end" font-size="9" fill="#666">15fps</text>
  
  <!-- 平稳的帧率线 -->
  <polyline points="465,152 500,150 535,152 570,150 605,152 640,150 675,152 710,150" 
            fill="none" stroke="#2e7d32" stroke-width="2"/>
  
  <!-- 缓冲效果 -->
  <rect x="520" y="175" width="120" height="25" rx="3" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="580" y="192" text-anchor="middle" font-size="9" fill="#2e7d32">队列缓冲平滑波动</text>
  
  <!-- 异步版指标 -->
  <rect x="440" y="240" width="310" height="200" rx="5" fill="white" stroke="#ddd"/>
  
  <text x="595" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">性能指标</text>
  
  <!-- 指标项 -->
  <rect x="460" y="280" width="270" height="25" rx="3" fill="#c8e6c9"/>
  <text x="470" y="296" font-size="11" fill="#333">最低帧率: 29fps</text>
  
  <rect x="460" y="310" width="270" height="25" rx="3" fill="#c8e6c9"/>
  <text x="470" y="326" font-size="11" fill="#333">卡顿次数: 0次</text>
  
  <rect x="460" y="340" width="270" height="25" rx="3" fill="#c8e6c9"/>
  <text x="470" y="356" font-size="11" fill="#333">拖动窗口: 流畅</text>
  
  <rect x="460" y="370" width="270" height="25" rx="3" fill="#c8e6c9"/>
  <text x="470" y="386" font-size="11" fill="#333">CPU波动: 稳定40%</text>
  
  <rect x="460" y="400" width="270" height="25" rx="3" fill="#ffcdd2"/>
  <text x="470" y="416" font-size="11" fill="#333">延迟: 100ms (较高)</text>
  <!-- 底部总结 -->
  <rect x="30" y="470" width="740" height="20" rx="3" fill="#fff8e1" stroke="#ffa000"/>
  <text x="400" y="484" text-anchor="middle" font-size="11" fill="#333">权衡：异步版增加约 70ms 延迟，换取更流畅的播放体验和更好的响应性</text>
</svg>
