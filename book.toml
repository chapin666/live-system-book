[book]
title = "音视频开发实战：从播放器到连麦"
authors = ["live-system-book"]
description = "一本让你从 C++ 开发者成长为音视频工程师的实战教程"
language = "zh"
multilingual = false
src = "src"

[build]
build-dir = "book"
create-missing = false

[preprocessor.index]

[preprocessor.links]

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
curly-quotes = true
mathjax-support = true
copy-fonts = true
additional-css = ["custom.css"]
no-section-label = false

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.fold]
enable = true
level = 0

[output.html.print]
enable = true

[output.pdf]
enable = true
