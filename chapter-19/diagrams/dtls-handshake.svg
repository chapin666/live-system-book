<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!-- Background -->
  <rect width="900" height="500" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">DTLS 握手流程</text>
  
  <!-- Client (Offerer) -->
  <g transform="translate(100, 70)">
    <rect width="160" height="400" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    
    <text x="80" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Client</text>
    
    <text x="80" y="50" text-anchor="middle" font-size="10" fill="#666">(Offerer)</text>
    
    
    <rect x="20" y="70" width="120" height="50" fill="#bbdefb" rx="5"/>
    
    <text x="80" y="90" text-anchor="middle" font-size="10" fill="#333">生成临时密钥对</text>
    
    <text x="80" y="108" text-anchor="middle" font-size="9" fill="#666">(ClientHello中发送)</text>
  </g>
  
  
  <!-- Server (Answerer) -->
  <g transform="translate(640, 70)">
    <rect width="160" height="400" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="8"/>
    
    
    <text x="80" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#c2185b">Server</text>
    
    <text x="80" y="50" text-anchor="middle" font-size="10" fill="#666">(Answerer)</text>
    
    
    <rect x="20" y="70" width="120" height="50" fill="#f8bbd0" rx="5"/>
    
    <text x="80" y="90" text-anchor="middle" font-size="10" fill="#333">生成临时密钥对</text>
    
    <text x="80" y="108" text-anchor="middle" font-size="9" fill="#666">(ServerHello中发送)</text>
  </g>
  
  
  <!-- Timeline arrows -->
  <g>
    <!-- Arrow 1: ClientHello -->
    
    <path d="M 260 150 Q 450 150 640 150" stroke="#1976d2" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
    
    <rect x="350" y="120" width="200" height="50" fill="#fff" stroke="#1976d2" stroke-width="1" rx="5"/>
    
    <text x="450" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">1. ClientHello</text>
    
    <text x="450" y="158" text-anchor="middle" font-size="9" fill="#666">• 客户端随机数</text>
    
    <text x="450" y="172" text-anchor="middle" font-size="9" fill="#666">• 支持的密码套件</text>
    
    
    <!-- Arrow 2: ServerHello/Certificate -->
    
    
    <path d="M 640 220 Q 450 220 260 220" stroke="#e91e63" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
    
    <rect x="310" y="190" width="280" height="50" fill="#fff" stroke="#e91e63" stroke-width="1" rx="5"/>
    
    <text x="450" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2185b">2. ServerHello + Certificate</text>
    
    <text x="450" y="228" text-anchor="middle" font-size="9" fill="#666">• 服务端随机数 • 证书 • 选择的密码套件</text>
    
    
    <!-- Arrow 3: ClientKeyExchange -->
    
    
    <path d="M 260 290 Q 450 290 640 290" stroke="#1976d2" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
    
    <rect x="310" y="260" width="280" height="50" fill="#fff" stroke="#1976d2" stroke-width="1" rx="5"/>
    
    <text x="450" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">3. ClientKeyExchange + ChangeCipherSpec</text>
    
    <text x="450" y="298" text-anchor="middle" font-size="9" fill="#666">• 预主密钥 • 验证证书</text>
    
    
    <!-- Arrow 4: Server Finished -->
    
    
    <path d="M 640 360 Q 450 360 260 360" stroke="#e91e63" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
    
    <rect x="330" y="330" width="240" height="50" fill="#fff" stroke="#e91e63" stroke-width="1" rx="5"/>
    
    <text x="450" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2185b">4. ChangeCipherSpec + Finished</text>
    
    <text x="450" y="368" text-anchor="middle" font-size="9" fill="#666">• 确认密钥交换完成</text>
  </g>
  
  
  <!-- Key Derivation Box -->
  <g transform="translate(350, 410)">
    <rect width="200" height="70" fill="#e8f5e9" stroke="#4caf50" stroke-width="1" rx="8"/>
    
    
    <text x="100" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">密钥派生</text>
    
    <text x="100" y="45" text-anchor="middle" font-size="10" fill="#333">预主密钥 → 主密钥 → 密钥块</text>
    
    <text x="100" y="62" text-anchor="middle" font-size="9" fill="#666">(用于SRTP加密的密钥)</text>
  </g>
  
  
  <!-- DTLS vs TLS Note -->
  <g transform="translate(50, 440)">
    <text x="0" y="15" font-size="11" font-weight="bold" fill="#333">DTLS 特点:</text>
    
    <text x="80" y="15" font-size="10" fill="#666">• 基于UDP传输，消息可能乱序/丢失/重传</text>
    
    <text x="350" y="15" font-size="10" fill="#666">• 添加消息序列号实现可靠性</text>
    
    <text x="580" y="15" font-size="10" fill="#666">• 握手完成后导出SRTP密钥</text>
  </g>
  
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e91e63"/>
    </marker>
  </defs>
</svg>