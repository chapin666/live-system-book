<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="350" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">码率控制策略对比</text>
  
  <!-- CBR Section -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="200" height="280" fill="#fff" stroke="#4a90d9" stroke-width="2" rx="5"/>
    <text x="100" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#4a90d9">CBR</text>
    <text x="100" y="50" text-anchor="middle" font-size="12" fill="#666">恒定码率</text>
    
    <!-- CBR Graph -->
    <rect x="20" y="70" width="160" height="80" fill="#f0f8ff" stroke="#ddd"/>
    <polyline points="25,145 55,145 85,145 115,145 145,145 175,145" fill="none" stroke="#4a90d9" stroke-width="3"/>
    <text x="100" y="165" text-anchor="middle" font-size="10" fill="#666">码率稳定</text>
    
    <!-- Features -->
    <text x="15" y="190" font-size="11" fill="#333">✓ 网络带宽稳定</text>
    <text x="15" y="210" font-size="11" fill="#333">✓ 延迟可控</text>
    <text x="15" y="230" font-size="11" fill="#333">✓ CDN 成本可控</text>
    
    <text x="15" y="260" font-size="11" font-weight="bold" fill="#28a745">推荐：直播场景</text>
  </g>
  
  <!-- VBR Section -->
  <g transform="translate(250, 80)">
    <rect x="0" y="0" width="200" height="280" fill="#fff" stroke="#5cb85c" stroke-width="2" rx="5"/>
    <text x="100" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#5cb85c">VBR</text>
    <text x="100" y="50" text-anchor="middle" font-size="12" fill="#666">可变码率</text>
    
    <!-- VBR Graph -->
    <rect x="20" y="70" width="160" height="80" fill="#f0fff0" stroke="#ddd"/>
    <polyline points="25,130 45,100 75,140 95,90 125,135 155,85 175,125" fill="none" stroke="#5cb85c" stroke-width="3"/>
    <text x="100" y="165" text-anchor="middle" font-size="10" fill="#666">码率随内容波动</text>
    
    <!-- Features -->
    <text x="15" y="190" font-size="11" fill="#333">✓ 质量最优</text>
    <text x="15" y="210" font-size="11" fill="#333">✓ 文件体积小</text>
    <text x="15" y="230" font-size="11" fill="#333">✗ 带宽需求波动大</text>
    
    <text x="15" y="260" font-size="11" font-weight="bold" fill="#6c757d">适合：点播/VOD</text>
  </g>
  
  <!-- CRF Section -->
  <g transform="translate(470, 80)">
    <rect x="0" y="0" width="200" height="280" fill="#fff" stroke="#f0ad4e" stroke-width="2" rx="5"/>
    <text x="100" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#f0ad4e">CRF</text>
    <text x="100" y="50" text-anchor="middle" font-size="12" fill="#666">恒定质量</text>
    
    <!-- CRF Graph -->
    <rect x="20" y="70" width="160" height="80" fill="#fffaf0" stroke="#ddd"/>
    <polyline points="25,115 55,80 85,120 115,70 145,125 175,75" fill="none" stroke="#f0ad4e" stroke-width="3"/>
    <text x="100" y="165" text-anchor="middle" font-size="10" fill="#666">质量恒定，码率波动大</text>
    
    <!-- Features -->
    <text x="15" y="190" font-size="11" fill="#333">✓ 质量可控</text>
    <text x="15" y="210" font-size="11" fill="#333">✓ 无需设置码率</text>
    <text x="15" y="230" font-size="11" fill="#333">✗ 码率不可预测</text>
    
    <text x="15" y="260" font-size="11" font-weight="bold" fill="#6c757d">适合：存档/转码</text>
  </g>
</svg>