<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
  <rect width="500" height="280" fill="#fafafa"/>
  
  <!-- 标题 -->
  <text x="250" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">SimplePipeline 架构</text>
  
  <!-- 外框 -->
  <rect x="30" y="40" width="440" height="220" rx="10" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  
  <!-- 核心模块区域 -->
  <rect x="50" y="60" width="400" height="100" rx="6" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="70" y="80" font-size="11" fill="#666">核心模块</text>
  
  <!-- Demuxer -->
  <rect x="70" y="95" width="100" height="50" rx="4" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="120" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Demuxer</text>
  <text x="120" y="138" text-anchor="middle" font-size="10" fill="#666">解封装</text>
  
  <!-- 箭头1 -->
  <path d="M 170 120 L 200 120" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Decoder -->
  <rect x="200" y="95" width="100" height="50" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="250" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Decoder</text>
  <text x="250" y="138" text-anchor="middle" font-size="10" fill="#666">解码</text>
  
  <!-- 箭头2 -->
  <path d="M 300 120 L 330 120" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Renderer -->
  <rect x="330" y="95" width="100" height="50" rx="4" fill="#fce4ec" stroke="#c2185b" stroke-width="2"/>
  <text x="380" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Renderer</text>
  <text x="380" y="138" text-anchor="middle" font-size="10" fill="#666">渲染</text>
  
  <!-- 基础设施区域 -->
  <rect x="50" y="180" width="400" height="60" rx="6" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="70" y="200" font-size="11" fill="#666">基础设施</text>
  
  <!-- Observer -->
  <rect x="70" y="210" width="100" height="25" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="120" y="227" text-anchor="middle" font-size="10" fill="#333">Observer</text>
  
  <!-- Stats -->
  <rect x="200" y="210" width="100" height="25" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="250" y="227" text-anchor="middle" font-size="10" fill="#333">Stats</text>
  
  <!-- ErrorCode -->
  <rect x="330" y="210" width="100" height="25" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="380" y="227" text-anchor="middle" font-size="10" fill="#333">ErrorCode</text>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
</svg>