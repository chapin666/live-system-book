<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180">
  <rect width="800" height="180" fill="#fafafa"/>
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">视频播放流程</text>
  
  <!-- MP4文件 -->
  <rect x="30" y="70" width="120" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="90" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">MP4文件</text>
  <text x="90" y="120" text-anchor="middle" font-size="11" fill="#666">100MB</text>
  
  <!-- 箭头1 -->
  <path d="M 150 105 L 190 105" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="170" y="95" text-anchor="middle" font-size="10" fill="#888">解封装</text>
  
  <!-- H.264 -->
  <rect x="190" y="70" width="120" height="70" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="250" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">H.264</text>
  <text x="250" y="120" text-anchor="middle" font-size="11" fill="#666">压缩数据</text>
  
  <!-- 箭头2 -->
  <path d="M 310 105 L 350 105" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="95" text-anchor="middle" font-size="10" fill="#888">解码</text>
  
  <!-- YUV像素 -->
  <rect x="350" y="70" width="120" height="70" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="410" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">YUV像素</text>
  <text x="410" y="120" text-anchor="middle" font-size="11" fill="#666">原始数据</text>
  
  <!-- 箭头3 -->
  <path d="M 470 105 L 510 105" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="490" y="95" text-anchor="middle" font-size="10" fill="#888">渲染</text>
  
  <!-- 屏幕 -->
  <rect x="510" y="70" width="120" height="70" rx="8" fill="#fce4ec" stroke="#c2185b" stroke-width="2"/>
  <text x="570" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">屏幕</text>
  <text x="570" y="120" text-anchor="middle" font-size="11" fill="#666">显示</text>
  
  <!-- 底部标注 -->
  <text x="90" y="165" text-anchor="middle" font-size="10" fill="#1976d2">Demuxer</text>
  <text x="250" y="165" text-anchor="middle" font-size="10" fill="#f57c00">Decoder</text>
  <text x="410" y="165" text-anchor="middle" font-size="10" fill="#388e3c">Renderer</text>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
</svg>