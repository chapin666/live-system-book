<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="ipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFECB3"/>
      <stop offset="100%" style="stop-color:#FFE082"/>
    </linearGradient>
    <linearGradient id="udpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8E6C9"/>
      <stop offset="100%" style="stop-color:#A5D6A7"/>
    </linearGradient>
    <linearGradient id="rtpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#BBDEFB"/>
      <stop offset="100%" style="stop-color:#90CAF9"/>
    </linearGradient>
    <linearGradient id="payloadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E1BEE7"/>
      <stop offset="100%" style="stop-color:#CE93D8"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="400" fill="#FAFAFA"/>
  
  <!-- 标题 -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#333">RTP 数据包结构</text>
  
  <!-- 完整数据包 -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="700" height="120" rx="5" fill="#fff" stroke="#ddd" stroke-width="2"/>
    
    <!-- IP Header -->
    <rect x="10" y="10" width="130" height="100" rx="3" fill="url(#ipGrad)" stroke="#F9A825" stroke-width="1"/>
    <text x="75" y="35" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#F57F17">IP Header</text>
    <text x="75" y="55" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">20 bytes</text>
    <text x="75" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#888">源/目的地址</text>
    <text x="75" y="90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#888">协议类型</text>
    
    <!-- UDP Header -->
    <rect x="150" y="10" width="100" height="100" rx="3" fill="url(#udpGrad)" stroke="#43A047" stroke-width="1"/>
    <text x="200" y="35" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#2E7D32">UDP Header</text>
    <text x="200" y="55" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">8 bytes</text>
    <text x="200" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#888">源/目的端口</text>
    <text x="200" y="90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#888">长度/校验和</text>
    
    <!-- RTP Header -->
    <rect x="260" y="10" width="120" height="100" rx="3" fill="url(#rtpGrad)" stroke="#1976D2" stroke-width="1"/>
    <text x="320" y="35" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1565C0">RTP Header</text>
    <text x="320" y="55" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">12+ bytes</text>
    <text x="320" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#888">序列号/时间戳</text>
    <text x="320" y="90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#888">SSRC/PT</text>
    
    <!-- RTP Payload -->
    <rect x="390" y="10" width="300" height="100" rx="3" fill="url(#payloadGrad)" stroke="#7B1FA2" stroke-width="1"/>
    <text x="540" y="35" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#6A1B9A">RTP Payload</text>
    <text x="540" y="55" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">可变长度</text>
    <text x="540" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#888">H.264 NALU /</text>
    <text x="540" y="90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#888">Opus 音频帧</text>
  </g>
  
  <!-- 详细分解 -->
  <g transform="translate(50, 200)">
    <text x="350" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">RTP Header 详细结构（12字节固定头）</text>
    
    <!-- 比特位标记 -->
    <g transform="translate(0, 35)">
      <text x="25" y="0" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">0</text>
      <text x="75" y="0" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">7</text>
      <text x="125" y="0" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">15</text>
      <text x="275" y="0" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">31</text>
    </g>
    
    <!-- 第一行：V P X CC M PT -->
    <g transform="translate(0, 45)">
      <rect x="0" y="0" width="50" height="35" fill="#FFCDD2" stroke="#E57373" stroke-width="1"/>
      <text x="25" y="22" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#C62828">V=2</text>
      
      <rect x="50" y="0" width="25" height="35" fill="#F8BBD9" stroke="#F06292" stroke-width="1"/>
      <text x="62" y="22" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#C2185B">P</text>
      
      <rect x="75" y="0" width="25" height="35" fill="#E1BEE7" stroke="#BA68C8" stroke-width="1"/>
      <text x="87" y="22" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#8E24AA">X</text>
      
      <rect x="100" y="0" width="50" height="35" fill="#D1C4E9" stroke="#9575CD" stroke-width="1"/>
      <text x="125" y="22" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#5E35B1">CC</text>
      
      <rect x="150" y="0" width="25" height="35" fill="#C5CAE9" stroke="#7986CB" stroke-width="1"/>
      <text x="162" y="22" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#3949AB">M</text>
      
      <rect x="175" y="0" width="75" height="35" fill="#BBDEFB" stroke="#64B5F6" stroke-width="1"/>
      <text x="212" y="22" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#1976D2">PT</text>
      
      <rect x="250" y="0" width="150" height="35" fill="#B3E5FC" stroke="#4FC3F7" stroke-width="1"/>
      <text x="325" y="22" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#0288D1">Sequence Number</text>
    </g>
    
    <!-- 第二行：Timestamp -->
    <g transform="translate(0, 80)">
      <rect x="0" y="0" width="400" height="35" fill="#B2DFDB" stroke="#4DB6AC" stroke-width="1"/>
      <text x="200" y="22" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#00695C">Timestamp (32 bits)</text>
    </g>
    
    <!-- 第三行：SSRC -->
    <g transform="translate(0, 115)">
      <rect x="0" y="0" width="400" height="35" fill="#C8E6C9" stroke="#81C784" stroke-width="1"/>
      <text x="200" y="22" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2E7D32">SSRC (Synchronization Source Identifier)</text>
    </g>
    
    <!-- CSRC 列表（可选） -->
    <g transform="translate(0, 150)">
      <rect x="0" y="0" width="400" height="35" fill="#FFF9C4" stroke="#FFF176" stroke-width="1" stroke-dasharray="5,3"/>
      <text x="200" y="22" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#F9A825">CSRC List (0-15 items, optional)</text>
    </g>
    
    <!-- 字段说明 -->
    <g transform="translate(420, 45)">
      <rect x="0" y="0" width="230" height="140" rx="5" fill="#f5f5f5" stroke="#ddd"/>
      <text x="115" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">字段说明</text>
      
      <text x="10" y="45" font-family="Arial, sans-serif" font-size="10" fill="#333"><tspan font-weight="bold">V(2):</tspan> 版本号，固定为2</text>
      <text x="10" y="65" font-family="Arial, sans-serif" font-size="10" fill="#333"><tspan font-weight="bold">P(1):</tspan> 填充标志</text>
      <text x="10" y="85" font-family="Arial, sans-serif" font-size="10" fill="#333"><tspan font-weight="bold">X(1):</tspan> 扩展标志</text>
      <text x="10" y="105" font-family="Arial, sans-serif" font-size="10" fill="#333"><tspan font-weight="bold">CC(4):</tspan> CSRC计数</text>
      <text x="10" y="125" font-family="Arial, sans-serif" font-size="10" fill="#333"><tspan font-weight="bold">M(1):</tspan> 标记位</text>
      <text x="10" y="145" font-family="Arial, sans-serif" font-size="10" fill="#333"><tspan font-weight="bold">PT(7):</tspan> 负载类型</text>
    </g>
  </g>
</svg>