<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="600" fill="#FAFAFA"/>
  <rect width="900" height="600" fill="url(#grid)"/>
  
  <!-- 标题 -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">JitterBuffer 工作原理</text>
  
  <!-- 网络抖动图示 -->
  <g transform="translate(50, 50)">
    <text x="400" y="15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#D32F2F">网络抖动：数据包到达时间不均匀</text>
    
    <!-- 时间轴 -->
    <line x1="50" y1="50" x2="750" y2="50" stroke="#333" stroke-width="2"/>
    <text x="400" y="45" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">时间 →</text>
    
    <!-- 发送时间（均匀） -->
    <g transform="translate(0, 60)">
      <text x="30" y="10" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#666">发送</text>
      <rect x="80" y="0" width="20" height="15" fill="#4CAF50"/>
      <rect x="180" y="0" width="20" height="15" fill="#4CAF50"/>
      <rect x="280" y="0" width="20" height="15" fill="#4CAF50"/>
      <rect x="380" y="0" width="20" height="15" fill="#4CAF50"/>
      <rect x="480" y="0" width="20" height="15" fill="#4CAF50"/>
      <rect x="580" y="0" width="20" height="15" fill="#4CAF50"/>
      <text x="85" y="30" font-family="monospace" font-size="9" fill="#333">T1</text>
      <text x="185" y="30" font-family="monospace" font-size="9" fill="#333">T2</text>
      <text x="285" y="30" font-family="monospace" font-size="9" fill="#333">T3</text>
      <text x="385" y="30" font-family="monospace" font-size="9" fill="#333">T4</text>
      <text x="485" y="30" font-family="monospace" font-size="9" fill="#333">T5</text>
      <text x="585" y="30" font-family="monospace" font-size="9" fill="#333">T6</text>
    </g>
    
    <!-- 接收时间（抖动） -->
    <g transform="translate(0, 100)">
      <text x="30" y="10" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#666">接收</text>
      <rect x="85" y="0" width="20" height="15" fill="#FF9800"/>
      <rect x="195" y="0" width="20" height="15" fill="#FF9800"/>
      <rect x="260" y="0" width="20" height="15" fill="#FF5722" stroke="#D32F2F" stroke-width="2"/>
      <rect x="400" y="0" width="20" height="15" fill="#FF9800"/>
      <rect x="510" y="0" width="20" height="15" fill="#FF9800"/>
      <rect x="620" y="0" width="20" height="15" fill="#FF9800"/>
      <text x="90" y="30" font-family="monospace" font-size="9" fill="#333">T1+5</text>
      <text x="200" y="30" font-family="monospace" font-size="9" fill="#333">T2+15</text>
      <text x="265" y="30" font-family="monospace" font-size="9" fill="#D32F2F">T3-20</text>
      <text x="405" y="30" font-family="monospace" font-size="9" fill="#333">T4+20</text>
      <text x="515" y="30" font-family="monospace" font-size="9" fill="#333">T5+10</text>
      <text x="625" y="30" font-family="monospace" font-size="9" fill="#333">T6+20</text>
      
      <!-- 抖动标注 -->
      <path d="M270 -10 Q 270 -25 300 -25" fill="none" stroke="#D32F2F" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="320" y="-20" font-family="Arial, sans-serif" font-size="9" fill="#D32F2F">早到！</text>
    </g>
  </g>
  
  <!-- JitterBuffer 架构 -->
  <g transform="translate(50, 200)">
    <text x="400" y="15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1565C0">JitterBuffer 架构</text>
    
    <!-- 输入 -->
    <rect x="0" y="40" width="120" height="200" rx="5" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/>
    <text x="60" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1565C0">输入数据包</text>
    <text x="60" y="90" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">Pkt Seq: 105</text>
    <text x="60" y="110" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">Pkt Seq: 106</text>
    <text x="60" y="130" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">Pkt Seq: 107</text>
    <text x="60" y="150" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">Pkt Seq: 108</text>
    <text x="60" y="170" font-family="monospace" font-size="9" text-anchor="middle" fill="#D32F2F">Pkt Seq: 104</text>
    <text x="60" y="190" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">Pkt Seq: 109</text>
    <text x="60" y="215" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">乱序到达</text>
  </g>
  
  <!-- 箭头 -->
  <g transform="translate(175, 280)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  
  <!-- 排序缓冲区 -->
  <g transform="translate(230, 200)">
    <rect x="0" y="40" width="150" height="200" rx="5" fill="#FFF8E1" stroke="#FFC107" stroke-width="2"/>
    <text x="75" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#FF8F00">排序缓冲区</text>
    <text x="75" y="85" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">按序列号排序</text>
    
    <!-- 排序后的包 -->
    <rect x="20" y="100" width="110" height="18" fill="#C8E6C9"/>
    <text x="75" y="112" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">104 [早到]</text>
    
    <rect x="20" y="122" width="110" height="18" fill="#C8E6C9"/>
    <text x="75" y="134" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">105</text>
    
    <rect x="20" y="144" width="110" height="18" fill="#C8E6C9"/>
    <text x="75" y="156" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">106</text>
    
    <rect x="20" y="166" width="110" height="18" fill="#C8E6C9"/>
    <text x="75" y="178" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">107</text>
    
    <rect x="20" y="188" width="110" height="18" fill="#BBDEFB"/>
    <text x="75" y="200" font-family="monospace" font-size="9" text-anchor="middle" fill="#1565C0">108 [等待]</text>
  </g>
  
  <!-- 箭头 -->
  <g transform="translate(385, 280)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  
  <!-- 播放缓冲区 -->
  <g transform="translate(440, 200)">
    <rect x="0" y="40" width="180" height="200" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
    <text x="90" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2E7D32">播放缓冲区</text>
    <text x="90" y="82" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">等待目标延迟后输出</text>
    
    <!-- 延迟目标线 -->
    <line x1="10" y1="155" x2="170" y2="155" stroke="#D32F2F" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="90" y="170" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#D32F2F">目标延迟线 (100ms)</text>
    
    <!-- 缓冲区中的包 -->
    <rect x="20" y="100" width="140" height="20" fill="#C8E6C9"/>
    <text x="90" y="114" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">104 ✓ 已输出</text>
    
    <rect x="20" y="125" width="140" height="20" fill="#C8E6C9"/>
    <text x="90" y="139" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">105 ✓ 已输出</text>
    
    <rect x="20" y="178" width="140" height="20" fill="#BBDEFB"/>
    <text x="90" y="192" font-family="monospace" font-size="9" text-anchor="middle" fill="#1565C0">106 等待中...</text>
    
    <rect x="20" y="203" width="140" height="25" fill="#FFF3E0"/>
    <text x="90" y="220" font-family="monospace" font-size="9" text-anchor="middle" fill="#E65100">107+ 等待</text>
  </g>
  
  <!-- 箭头 -->
  <g transform="translate(625, 280)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  
  <!-- 输出 -->
  <g transform="translate(680, 200)">
    <rect x="0" y="40" width="120" height="200" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
    <text x="60" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#7B1FA2">平滑输出</text>
    <text x="60" y="85" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">按时序解码</text>
    
    <rect x="20" y="100" width="80" height="20" fill="#E1BEE7"/>
    <text x="60" y="114" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">Frame 1</text>
    
    <rect x="20" y="125" width="80" height="20" fill="#E1BEE7"/>
    <text x="60" y="139" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">Frame 2</text>
    
    <rect x="20" y="150" width="80" height="20" fill="#E1BEE7"/>
    <text x="60" y="164" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">Frame 3</text>
    
    <rect x="20" y="175" width="80" height="20" fill="#E1BEE7"/>
    <text x="60" y="189" font-family="monospace" font-size="9" text-anchor="middle" fill="#333">Frame 4</text>
    
    <text x="60" y="215" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">稳定帧率输出</text>
  </g>
  
  <!-- 自适应调整 -->
  <g transform="translate(50, 420)">
    <text x="400" y="15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#E65100">自适应延迟调整</text>
    
    <!-- 低抖动场景 -->
    <g transform="translate(0, 35)">
      <rect x="0" y="0" width="220" height="120" rx="5" fill="#E8F5E9" stroke="#4CAF50"/>
      <text x="110" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2E7D32">低抖动场景</text>
      <text x="110" y="50" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">抖动估计: 10ms</text>
      <text x="110" y="70" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">目标延迟: 60ms</text>
      <text x="110" y="95" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">网络良好，降低延迟</text>
    </g>
    
    <!-- 高抖动场景 -->
    <g transform="translate(240, 35)">
      <rect x="0" y="0" width="220" height="120" rx="5" fill="#FFF3E0" stroke="#FF9800"/>
      <text x="110" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#E65100">高抖动场景</text>
      <text x="110" y="50" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">抖动估计: 80ms</text>
      <text x="110" y="70" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">目标延迟: 150ms</text>
      <text x="110" y="95" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">网络波动，增加缓冲</text>
    </g>
    
    <!-- 计算公式 -->
    <g transform="translate(480, 35)">
      <rect x="0" y="0" width="320" height="120" rx="5" fill="#E3F2FD" stroke="#2196F3"/>
      <text x="160" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1565C0">抖动计算 (RFC 3550)</text>
      
      <text x="10" y="50" font-family="monospace" font-size="10" fill="#333">D(i) = arrival_time(i) - RTP_timestamp(i)</text>
      <text x="10" y="70" font-family="monospace" font-size="10" fill="#333">J(i) = J(i-1) + (|D(i) - D(i-1)| - J(i-1)) / 16</text>
      <text x="10" y="95" font-family="Arial, sans-serif" font-size="10" fill="#666">指数加权移动平均，平滑估计</text>
    </g>
  </g>
</svg>