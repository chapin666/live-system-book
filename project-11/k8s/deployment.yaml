apiVersion: apps/v1
kind: Deployment
metadata:
  name: live-signaling
  namespace: live-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: live-signaling
  template:
    metadata:
      labels:
        app: live-signaling
    spec:
      containers:
      - name: signaling
        image: live-system/signaling:latest
        ports:
        - containerPort: 7880
          name: websocket
        env:
        - name: MODE
          value: "all"
        - name: SIGNALING_PORT
          value: "7880"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 7880
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 7880
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: live-signaling
  namespace: live-system
spec:
  selector:
    app: live-signaling
  ports:
  - port: 7880
    targetPort: 7880
    name: websocket
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: live-sfu
  namespace: live-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: live-sfu
  template:
    metadata:
      labels:
        app: live-sfu
    spec:
      containers:
      - name: sfu
        image: live-system/sfu:latest
        ports:
        - containerPort: 7881
          protocol: UDP
          name: rtp
        - containerPort: 7882
          name: rtcp
        env:
        - name: MODE
          value: "sfu"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: live-sfu
  namespace: live-system
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: udp
spec:
  selector:
    app: live-sfu
  ports:
  - port: 7881
    targetPort: 7881
    protocol: UDP
    name: rtp
  type: LoadBalancer
---
apiVersion: v1
kind: Namespace
metadata:
  name: live-system