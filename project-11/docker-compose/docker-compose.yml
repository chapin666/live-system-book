version: '3.8'

services:
  # 信令服务
  signaling:
    build:
      context: ../project-10
      dockerfile: Dockerfile
    ports:
      - "7880:7880"
    environment:
      - MODE=all
      - SIGNALING_PORT=7880
      - SFU_PORT=7881
    networks:
      - live-network
    restart: unless-stopped

  # SFU 服务
  sfu:
    build:
      context: ../project-10
      dockerfile: Dockerfile
    ports:
      - "7881:7881/udp"
      - "7882:7882"
    environment:
      - MODE=sfu
      - SFU_PORT=7881
    networks:
      - live-network
    restart: unless-stopped

  # MCU 混流服务
  mcu:
    build:
      context: ../project-10
      dockerfile: Dockerfile
    environment:
      - MODE=mcu
    networks:
      - live-network
    restart: unless-stopped

  # 录制服务
  recorder:
    build:
      context: ../project-09
      dockerfile: Dockerfile
    volumes:
      - ./data/recordings:/recordings
    environment:
      - OUTPUT_DIR=/recordings
      - SEGMENT_DURATION=10
    networks:
      - live-network
    restart: unless-stopped

  # 回放服务
  playback:
    build:
      context: ../project-09
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data/recordings:/recordings:ro
    environment:
      - HTTP_PORT=8080
      - HLS_ROOT=/recordings
    networks:
      - live-network
    restart: unless-stopped

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - signaling
      - playback
    networks:
      - live-network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - live-network
    restart: unless-stopped

networks:
  live-network:
    driver: bridge

volumes:
  redis-data: