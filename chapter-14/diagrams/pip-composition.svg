<svg viewBox="0 0 700 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="350" fill="#f8f9fa"/>
  
  <text x="350" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">画中画（PiP）合成</text>
  
  <!-- Main frame -->
  <rect x="50" y="60" width="280" height="180" fill="#333" stroke="#555" stroke-width="2" rx="3"/>
  <text x="190" y="155" text-anchor="middle" font-size="14" fill="#666">主画面</text>
  
  <!-- PiP window -->
  <rect x="240" y="80" width="70" height="52" fill="#4a90d9" stroke="#357abd" stroke-width="2" rx="3"/>
  <text x="275" y="110" text-anchor="middle" font-size="10" fill="white">小窗</text>
  
  <!-- Position labels -->
  <text x="275" y="75" text-anchor="middle" font-size="9" fill="#999">右下角</text>
  
  <!-- Arrow -->
  <line x1="360" y1="150" x2="420" y2="150" stroke="#666" stroke-width="2" marker-end="url(#arrowcomp)"/>
  
  <!-- Composition diagram -->
  <g transform="translate(450, 70)">
    <text x="100" y="0" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">合成原理</text>
    
    <!-- Layer 1 (bottom) -->
    <rect x="0" y="20" width="200" height="50" fill="#e3f2fd" stroke="#4a90d9" stroke-width="1" rx="3"/>
    <text x="100" y="50" text-anchor="middle" font-size="12" fill="#333">底层：主视频</text>
    
    <!-- Layer 2 (top) -->
    <rect x="120" y="40" width="70" height="40" fill="#4a90d9" stroke="#357abd" stroke-width="1" rx="3"/>
    <text x="155" y="65" text-anchor="middle" font-size="10" fill="white">小窗</text>
    
    <!-- Blend op -->
    <text x="100" y="105" text-anchor="middle" font-size="11" fill="#666">混合模式：Alpha 叠加</text>
    
    <text x="100" y="125" text-anchor="middle" font-size="10" fill="#999">小窗覆盖主画面区域</text>
  </g>
  
  <!-- Position options -->
  <g transform="translate(50, 260)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#333">常见布局</text>
    
    <rect x="0" y="15" width="60" height="40" fill="#333" rx="2"/>
    <rect x="2" y="17" width="18" height="14" fill="#4a90d9" rx="1"/>
    <text x="30" y="55" text-anchor="middle" font-size="9" fill="#666">左上</text>
    
    <rect x="80" y="15" width="60" height="40" fill="#333" rx="2"/>
    <rect x="120" y="17" width="18" height="14" fill="#4a90d9" rx="1"/>
    <text x="110" y="55" text-anchor="middle" font-size="9" fill="#666">右上</text>
    
    <rect x="160" y="15" width="60" height="40" fill="#333" rx="2"/>
    <rect x="162" y="39" width="18" height="14" fill="#4a90d9" rx="1"/>
    <text x="190" y="55" text-anchor="middle" font-size="9" fill="#666">左下</text>
    
    <rect x="240" y="15" width="60" height="40" fill="#333" rx="2"/>
    <rect x="280" y="39" width="18" height="14" fill="#4a90d9" rx="1"/>
    <text x="270" y="55" text-anchor="middle" font-size="9" fill="#666">右下</text>
  </g>
  
  <!-- Use cases -->
  <g transform="translate(380, 260)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#333">应用场景</text>
    <text x="0" y="20" font-size="10" fill="#666">• 游戏直播：游戏画面 + 主播摄像头</text>
    <text x="0" y="38" font-size="10" fill="#666">• 在线教学：PPT + 讲师画面</text>
    <text x="0" y="56" font-size="10" fill="#666">• 视频会议：主讲人 + 共享屏幕</text>
  </g>
  
  <defs>
    <marker id="arrowcomp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
</svg>