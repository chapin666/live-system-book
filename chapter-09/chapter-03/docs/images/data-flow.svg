<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <!-- 背景 -->
  <rect width="900" height="400" fill="#fafafa"/>
  
  <!-- 标题 -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#333">
    Pipeline 数据流
  </text>
  
  <!-- 输入文件 -->
  <rect x="50" y="100" width="120" height="80" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="110" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1565c0">
    视频文件
  </text>
  <text x="110" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555">
    MP4 / FLV / AVI
  </text>
  <text x="110" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#777">
    (H.264编码)
  </text>
  
  <!-- 箭头：文件 -> Demuxer -->
  <path d="M170 140 L220 140" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Demuxer -->
  <rect x="220" y="100" width="130" height="80" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="285" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#f57f17">
    Demuxer
  </text>
  <text x="285" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    解封装
  </text>
  <text x="285" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#777">
    av_read_frame
  </text>
  
  <!-- 箭头：Demuxer -> Decoder -->
  <path d="M350 140 L400 140" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="375" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#666" font-style="italic">
    AVPacket
  </text>
  
  <!-- Decoder -->
  <rect x="400" y="100" width="130" height="80" rx="6" fill="#ffccbc" stroke="#e64a19" stroke-width="2"/>
  <text x="465" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#d84315">
    Decoder
  </text>
  <text x="465" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    解码
  </text>
  <text x="465" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#777">
    H.264 → YUV
  </text>
  
  <!-- 箭头：Decoder -> Renderer -->
  <path d="M530 140 L580 140" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="555" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#666" font-style="italic">
    AVFrame
  </text>
  
  <!-- Renderer -->
  <rect x="580" y="100" width="130" height="80" rx="6" fill="#c8e6c9" stroke="#43a047" stroke-width="2"/>
  <text x="645" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">
    Renderer
  </text>
  <text x="645" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    渲染
  </text>
  <text x="645" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#777">
    YUV → 屏幕
  </text>
  
  <!-- 箭头：Renderer -> 屏幕 -->
  <path d="M710 140 L760 140" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- 屏幕 -->
  <rect x="760" y="100" width="100" height="80" rx="6" fill="#212121" stroke="#424242" stroke-width="2"/>
  <text x="810" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#fff">
    屏幕
  </text>
  
  <!-- 下方：详细数据说明 -->
  <rect x="50" y="220" width="810" height="150" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="65" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#333">
    数据格式详解
  </text>
  
  <!-- AVPacket -->
  <rect x="65" y="260" width="230" height="95" rx="4" fill="#fff8e1" stroke="#ff8f00" stroke-width="1"/>
  <text x="180" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#e65100">
    AVPacket
  </text>
  <text x="75" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    • pts: 显示时间戳
  </text>
  <text x="75" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    • data: 压缩数据指针
  </text>
  <text x="75" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    • size: 数据大小(字节)
  </text>
  <text x="75" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    • stream_index: 流索引
  </text>
  
  <!-- AVFrame -->
  <rect x="325" y="260" width="230" height="95" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1"/>
  <text x="440" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">
    AVFrame
  </text>
  <text x="335" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    • data[3]: Y/U/V平面指针
  </text>
  <text x="335" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    • linesize[3]: 行stride
  </text>
  <text x="335" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    • width/height: 宽高
  </text>
  <text x="335" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    • format: 像素格式(YUV420P)
  </text>
  
  <!-- YUV -->
  <rect x="585" y="260" width="260" height="95" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="715" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1565c0">
    YUV420P 内存布局
  </text>
  <text x="595" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    ┌─────────────────┐ Y (全分辨率)
  </text>
  <text x="595" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    ├─────────────────┤ U (1/4分辨率)
  </text>
  <text x="595" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    ├─────────────────┤ V (1/4分辨率)
  </text>
  <text x="595" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555">
    └─────────────────┘ 总大小: 1.5字节/像素
  </text>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
</svg>
