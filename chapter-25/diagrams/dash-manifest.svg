<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="900" height="480" fill="#fafafa"/>
  
  <!-- 标题 -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">DASH MPD (Media Presentation Description) 结构</text>
  
  <!-- ============== 左侧：DASH架构 ============== -->
  <rect x="20" y="60" width="420" height="240" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="230" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1565c0">DASH 播放流程</text>
  
  <!-- 服务器 -->
  <rect x="40" y="110" width="100" height="100" rx="6" fill="#42a5f5" stroke="#1565c0" stroke-width="2"/>
  <text x="90" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">服务器</text>
  <text x="90" y="165" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">manifest.mpd</text>
  <text x="90" y="185" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">segment</text>
  
  <!-- 播放器 -->
  <rect x="180" y="110" width="120" height="170" rx="6" fill="#66bb6a" stroke="#43a047" stroke-width="2"/>
  <text x="240" y="140" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">DASH播放器</text>
  <text x="240" y="165" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">1. 下载MPD</text>
  <text x="240" y="185" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">2. 解析Period</text>
  <text x="240" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">3. 选择Adaptation</text>
  <text x="240" y="225" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">4. 选择Representation</text>
  <text x="240" y="245" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">5. 下载Segment</text>
  <text x="240" y="265" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">6. 解码播放</text>
  
  <!-- HTTP箭头 -->
  <path d="M140 150 L180 150" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow-gray)"/>
  <path d="M240 280 L240 300 L90 300 L90 210" stroke="#1565c0" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="160" y="140" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">MPD</text>
  <text x="160" y="295" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#1565c0">Segment</text>
  
  <!-- ============== 右侧：MPD结构 ============== -->
  <rect x="460" y="60" width="420" height="240" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
  <text x="670" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ef6c00">MPD 结构层次</text>
  
  <rect x="480" y="100" width="380" height="180" rx="4" fill="#fff" stroke="#ffcc80" stroke-width="1"/>
  
  <!-- MPD根 -->
  <rect x="490" y="110" width="360" height="30" rx="3" fill="#ffe0b2" stroke="#f57c00" stroke-width="1"/>
  <text x="670" y="130" font-family="monospace" font-size="11" text-anchor="middle" fill="#333">&lt;MPD&gt; (根元素)</text>
  
  <!-- Period -->
  <rect x="500" y="150" width="340" height="30" rx="3" fill="#c5cae9" stroke="#5c6bc0" stroke-width="1"/>
  <text x="670" y="170" font-family="monospace" font-size="11" text-anchor="middle" fill="#333">&lt;Period&gt; (时间段)</text>
  
  <!-- AdaptationSet视频 -->
  <rect x="510" y="190" width="150" height="30" rx="3" fill="#b2dfdb" stroke="#26a69a" stroke-width="1"/>
  <text x="585" y="210" font-family="monospace" font-size="10" text-anchor="middle" fill="#333">&lt;AdaptationSet&gt; Video</text>
  
  <!-- AdaptationSet音频 -->
  <rect x="680" y="190" width="150" height="30" rx="3" fill="#b2dfdb" stroke="#26a69a" stroke-width="1"/>
  <text x="755" y="210" font-family="monospace" font-size="10" text-anchor="middle" fill="#333">&lt;AdaptationSet&gt; Audio</text>
  
  <!-- Representation视频 -->
  <rect x="520" y="230" width="40" height="40" rx="2" fill="#d1c4e9" stroke="#7e57c2" stroke-width="1"/>
  <text x="540" y="248" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">1080p</text>
  <text x="540" y="262" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">5Mbps</text>
  
  <rect x="565" y="230" width="40" height="40" rx="2" fill="#d1c4e9" stroke="#7e57c2" stroke-width="1"/>
  <text x="585" y="248" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">720p</text>
  <text x="585" y="262" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">3Mbps</text>
  
  <rect x="610" y="230" width="40" height="40" rx="2" fill="#d1c4e9" stroke="#7e57c2" stroke-width="1"/>
  <text x="630" y="248" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">480p</text>
  <text x="630" y="262" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">1Mbps</text>
  
  <!-- Representation音频 -->
  <rect x="700" y="230" width="60" height="40" rx="2" fill="#d1c4e9" stroke="#7e57c2" stroke-width="1"/>
  <text x="730" y="248" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">AAC</text>
  <text x="730" y="262" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">128kbps</text>
  
  <!-- SegmentList -->
  <text x="540" y="285" font-family="monospace" font-size="9" fill="#666">&lt;SegmentList&gt; → 000.m4s 001.m4s 002.m4s ...</text>
  
  <!-- ============== 下方：HLS vs DASH对比 ============== -->
  <rect x="20" y="320" width="860" height="140" rx="8" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
  <text x="450" y="345" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#6a1b9a">HLS vs DASH 对比</text>
  
  <!-- 表格 -->
  <rect x="40" y="365" width="820" height="85" rx="4" fill="#fff" stroke="#ce93d8" stroke-width="1"/>
  
  <!-- 表头 -->
  <rect x="40" y="365" width="820" height="25" fill="#e1bee7"/>
  <text x="150" y="382" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">对比项</text>
  <text x="380" y="382" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1565c0">HLS (Apple)</text>
  <text x="650" y="382" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ef6c00">DASH (MPEG)</text>
  
  <line x1="40" y1="390" x2="860" y2="390" stroke="#ce93d8" stroke-width="1"/>
  
  <!-- 行1 -->
  <text x="50" y="408" font-family="Arial, sans-serif" font-size="10" fill="#333">索引文件格式</text>
  <text x="310" y="408" font-family="Arial, sans-serif" font-size="10" fill="#333">m3u8 (文本播放列表)</text>
  <text x="580" y="408" font-family="Arial, sans-serif" font-size="10" fill="#333">MPD (XML描述文件)</text>
  
  <!-- 行2 -->
  <text x="50" y="428" font-family="Arial, sans-serif" font-size="10" fill="#333">切片格式</text>
  <text x="310" y="428" font-family="Arial, sans-serif" font-size="10" fill="#333">TS (MPEG-2 Transport Stream)</text>
  <text x="580" y="428" font-family="Arial, sans-serif" font-size="10" fill="#333">MP4 / TS (fMP4推荐)</text>
  
  <!-- 行3 -->
  <text x="50" y="408" font-family="Arial, sans-serif" font-size="10" fill="#333">索引文件格式</text>
  <text x="310" y="408" font-family="Arial, sans-serif" font-size="10" fill="#333">m3u8 (文本播放列表)</text>
  <text x="580" y="408" font-family="Arial, sans-serif" font-size="10" fill="#333">MPD (XML描述文件)</text>
  
  <!-- 行2 -->
  <text x="50" y="428" font-family="Arial, sans-serif" font-size="10" fill="#333">切片格式</text>
  <text x="310" y="428" font-family="Arial, sans-serif" font-size="10" fill="#333">TS (MPEG-2 Transport Stream)</text>
  <text x="580" y="428" font-family="Arial, sans-serif" font-size="10" fill="#333">MP4 / TS (fMP4推荐)</text>
  
  <!-- 修正行 -->
  <text x="50" y="408" font-family="Arial, sans-serif" font-size="10" fill="#333">索引文件格式</text>
  <text x="330" y="408" font-family="Arial, sans-serif" font-size="10" fill="#333">m3u8 (文本)</text>
  <text x="620" y="408" font-family="Arial, sans-serif" font-size="10" fill="#333">MPD (XML)</text>
  
  <line x1="280" y1="390" x2="280" y2="450" stroke="#ce93d8" stroke-width="1"/>
  <line x1="550" y1="390" x2="550" y2="450" stroke="#ce93d8" stroke-width="1"/>
  
  <text x="50" y="428" font-family="Arial, sans-serif" font-size="10" fill="#333">切片格式</text>
  <text x="330" y="428" font-family="Arial, sans-serif" font-size="10" fill="#333">TS (MPEG2)</text>
  <text x="620" y="428" font-family="Arial, sans-serif" font-size="10" fill="#333">fMP4 / TS</text>
  
  <text x="50" y="445" font-family="Arial, sans-serif" font-size="10" fill="#333">浏览器支持</text>
  <text x="330" y="445" font-family="Arial, sans-serif" font-size="10" fill="#333">Safari原生, Chrome需hls.js</text>
  <text x="620" y="445" font-family="Arial, sans-serif" font-size="10" fill="#333">Chrome/Edge原生, Safari需polyfill</text>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1565c0"/>
    </marker>
  </defs>
</svg>