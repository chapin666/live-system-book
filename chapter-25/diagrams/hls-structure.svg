<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="900" height="420" fill="#fafafa"/>
  
  <!-- 标题 -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">HLS (HTTP Live Streaming) 结构</text>
  
  <!-- ============== 上方：HLS架构图 ============== -->
  <rect x="20" y="60" width="540" height="180" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="290" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1565c0">HLS 播放流程</text>
  
  <!-- 服务器 -->
  <rect x="40" y="110" width="120" height="110" rx="6" fill="#42a5f5" stroke="#1565c0" stroke-width="2"/>
  <text x="100" y="140" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">服务器</text>
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#fff">playlist.m3u8</text>
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#fff">000.ts</text>
  <text x="100" y="205" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#fff">001.ts 002.ts...</text>
  
  <!-- HTTP请求 -->
  <path d="M160 150 L220 150" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow-gray)"/>
  <text x="190" y="140" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">HTTP</text>
  <text x="190" y="175" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">获取m3u8</text>
  
  <!-- 播放器 -->
  <rect x="220" y="110" width="140" height="110" rx="6" fill="#66bb6a" stroke="#43a047" stroke-width="2"/>
  <text x="290" y="140" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">播放器</text>
  <text x="290" y="165" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#fff">1. 解析m3u8</text>
  <text x="290" y="185" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#fff">2. 按序下载ts</text>
  <text x="290" y="205" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#fff">3. 解码播放</text>
  
  <!-- 继续请求 -->
  <path d="M290 220 L290 250 L160 250 L160 220" stroke="#1565c0" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="220" y="245" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1565c0">持续请求新切片</text>
  
  <!-- ============== 右侧：m3u8文件内容 ============== -->
  <rect x="580" y="60" width="300" height="180" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
  <text x="730" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ef6c00">playlist.m3u8 示例</text>
  
  <rect x="595" y="100" width="270" height="125" rx="4" fill="#fff" stroke="#ffcc80" stroke-width="1"/>
  <text x="605" y="120" font-family="monospace" font-size="11" fill="#333">#EXTM3U</text>
  <text x="605" y="140" font-family="monospace" font-size="11" fill="#333">#EXT-X-VERSION:3</text>
  <text x="605" y="160" font-family="monospace" font-size="11" fill="#333">#EXT-X-TARGETDURATION:6</text>
  <text x="605" y="180" font-family="monospace" font-size="11" fill="#333">#EXTINF:6.000,</text>
  <text x="605" y="200" font-family="monospace" font-size="11" fill="#1565c0">live000.ts</text>
  <text x="605" y="215" font-family="monospace" font-size="11" fill="#333">#EXTINF:6.000,</text>
  <text x="605" y="230" font-family="monospace" font-size="11" fill="#1565c0">live001.ts</text>
  
  <!-- ============== 下方：ts切片结构 ============== -->
  <rect x="20" y="260" width="860" height="140" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1"/>
  <text x="450" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2e7d32">TS (Transport Stream) 切片结构</text>
  
  <!-- TS包结构 -->
  <rect x="40" y="305" width="820" height="80" rx="4" fill="#fff" stroke="#a5d6a7" stroke-width="1"/>
  
  <!-- TS Header -->
  <rect x="50" y="315" width="80" height="60" rx="3" fill="#ffccbc" stroke="#ff7043" stroke-width="1"/>
  <text x="90" y="335" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">TS Header</text>
  <text x="90" y="355" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">4 bytes</text>
  
  <path d="M130 345 L150 345" stroke="#666" stroke-width="1" fill="none"/>
  
  <!-- Adaptation -->
  <rect x="150" y="315" width="80" height="60" rx="3" fill="#c5cae9" stroke="#5c6bc0" stroke-width="1"/>
  <text x="190" y="335" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">Adaptation</text>
  <text x="190" y="355" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">可变</text>
  
  <path d="M230 345 L250 345" stroke="#666" stroke-width="1" fill="none"/>
  
  <!-- Payload (PES) -->
  <rect x="250" y="315" width="120" height="60" rx="3" fill="#b2dfdb" stroke="#26a69a" stroke-width="1"/>
  <text x="310" y="335" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">PES Header</text>
  <text x="310" y="355" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">9+ bytes</text>
  
  <path d="M370 345 L390 345" stroke="#666" stroke-width="1" fill="none"/>
  
  <!-- Video/Audio Data -->
  <rect x="390" y="315" width="180" height="60" rx="3" fill="#d1c4e9" stroke="#7e57c2" stroke-width="1"/>
  <text x="480" y="335" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">ES (Elementary Stream)</text>
  <text x="480" y="355" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">H.264/H.265/AAC 数据</text>
  
  <!-- 188 bytes标注 -->
  <text x="90" y="395" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">每个TS包 = 188 bytes</text>
  
  <text x="480" y="395" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">时长通常 2-10 秒</text>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1565c0"/>
    </marker>
  </defs>
</svg>