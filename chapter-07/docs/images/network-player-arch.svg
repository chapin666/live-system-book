<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .box { fill: #f0f9ff; stroke: #0369a1; stroke-width: 2; rx: 8; }
      .thread { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; rx: 6; }
      .buffer { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 6; }
      .decoder { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 6; }
      .arrow { stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
      .dash { stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 5,5; }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #334155; }
      .title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: bold; fill: #0f172a; }
      .small { font-size: 10px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title" font-size="18">网络播放器架构</text>
  
  <!-- Download Thread -->
  <rect x="50" y="60" width="180" height="120" class="thread"/>
  <text x="140" y="85" text-anchor="middle" class="title">下载线程</text>
  
  <rect x="70" y="100" width="140" height="30" fill="#bfdbfe" stroke="#3b82f6" rx="2"/>
  <text x="140" y="118" text-anchor="middle" class="label" font-size="10">HTTP 请求</text>
  
  <rect x="70" y="135" width="140" height="30" fill="#bfdbfe" stroke="#3b82f6" rx="2"/>
  <text x="140" y="153" text-anchor="middle" class="label" font-size="10">Range 断点续传</text>
  
  <!-- Ring Buffer -->
  <rect x="280" y="60" width="200" height="120" class="buffer"/>
  <text x="380" y="85" text-anchor="middle" class="title">环形缓冲区</text>
  
  <!-- Buffer visualization -->
  <rect x="300" y="100" width="160" height="60" fill="#fff" stroke="#f59e0b" rx="4"/>
  
  <rect x="305" y="105" width="100" height="20" fill="#22c55e" rx="2"/>
  <text x="355" y="118" text-anchor="middle" class="small" fill="#fff">已缓冲</text>
  
  <rect x="410" y="105" width="45" height="20" fill="#e2e8f0" rx="2"/>
  <text x="432" y="118" text-anchor="middle" class="small">空闲</text>
  
  <line x1="300" y1="135" x2="460" y2="135" stroke="#cbd5e1" stroke-width="1"/>
  
  <text x="310" y="150" class="small">读指针 →</text>
  <text x="420" y="150" class="small">← 写指针</text>
  
  <!-- Decoder -->
  <rect x="530" y="60" width="150" height="120" class="decoder"/>
  <text x="605" y="85" text-anchor="middle" class="title">解码器</text>
  
  <rect x="550" y="100" width="110" height="30" fill="#bbf7d0" stroke="#22c55e" rx="2"/>
  <text x="605" y="118" text-anchor="middle" class="label" font-size="10">视频解码</text>
  
  <rect x="550" y="135" width="110" height="30" fill="#bbf7d0" stroke="#22c55e" rx="2"/>
  <text x="605" y="153" text-anchor="middle" class="label" font-size="10">音频解码</text>
  
  <!-- Renderer -->
  <rect x="720" y="60" width="60" height="120" class="box"/>
  <text x="750" y="100" text-anchor="middle" class="label">渲染</text>
  <text x="750" y="118" text-anchor="middle" class="label">显示</text>
  
  <text x="750" y="145" text-anchor="middle" class="small">SDL</text>
  
  <!-- Arrows -->
  <line x1="230" y1="120" x2="280" y2="120" class="arrow"/>
  <text x="255" y="110" text-anchor="middle" class="small">写入</text>
  
  <line x1="480" y1="120" x2="530" y2="120" class="arrow"/>
  <text x="505" y="110" text-anchor="middle" class="small">读取</text>
  
  <line x1="680" y1="120" x2="720" y2="120" class="arrow"/>
  
  <!-- Control -->
  <rect x="50" y="220" width="730" height="160" class="box"/>
  <text x="415" y="245" text-anchor="middle" class="title">缓冲控制与状态机</text>
  
  <!-- States -->
  <rect x="80" y="265" width="100" height="45" fill="#fef3c7" stroke="#f59e0b" rx="4"/>
  <text x="130" y="285" text-anchor="middle" class="label">BUFFERING</text>
  <text x="130" y="300" text-anchor="middle" class="small">缓冲中...</text>
  
  <rect x="220" y="265" width="100" height="45" fill="#dcfce7" stroke="#22c55e" rx="4"/>
  <text x="270" y="285" text-anchor="middle" class="label">PLAYING</text>
  <text x="270" y="300" text-anchor="middle" class="small">正常播放</text>
  
  <rect x="360" y="265" width="100" height="45" fill="#fecaca" stroke="#ef4444" rx="4"/>
  <text x="410" y="285" text-anchor="middle" class="label">STALLED</text>
  <text x="410" y="300" text-anchor="middle" class="small">缓冲不足</text>
  
  <rect x="500" y="265" width="100" height="45" fill="#e0e7ff" stroke="#6366f1" rx="4"/>
  <text x="550" y="285" text-anchor="middle" class="label">SEEKING</text>
  <text x="550" y="300" text-anchor="middle" class="small">跳转中</text>
  
  <rect x="640" y="265" width="110" height="45" fill="#f1f5f9" stroke="#64748b" rx="4"/>
  <text x="695" y="285" text-anchor="middle" class="label">COMPLETED</text>
  <text x="695" y="300" text-anchor="middle" class="small">播放完成</text>
  
  <!-- Transitions -->
  <line x1="180" y1="287" x2="220" y2="287" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>
  <text x="200" y="280" class="small">缓冲足够</text>
  
  <line x1="320" y1="287" x2="360" y2="287" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>
  <text x="340" y="280" class="small">缓冲空</text>
  
  <line x1="460" y1="287" x2="500" y2="287" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>
  <text x="480" y="280" class="small">Seek</text>
  
  <line x1="600" y1="287" x2="640" y2="287" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>
  <text x="620" y="280" class="small">EOF</text>
  
  <!-- Thresholds -->
  <rect x="80" y="330" width="670" height="40" fill="#f8fafc" stroke="#cbd5e1" rx="2"/>
  <text x="90" y="355" class="label" font-size="11">缓冲阈值: </text>
  <text x="170" y="355" class="small">low_water_mark = 1s (低于则暂停) | high_water_mark = 5s (达到则开始播放)</text>
</svg>