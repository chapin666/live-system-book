<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <style>
      .box { fill: #f0f9ff; stroke: #0369a1; stroke-width: 2; rx: 6; }
      .hw { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; rx: 4; }
      .sw { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 4; }
      .mem { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 4; }
      .arrow { stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
      .dash { stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 5,5; }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #334155; }
      .title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: bold; fill: #0f172a; }
      .small { font-size: 10px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="450" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" class="title" font-size="18">硬件解码管线</text>
  
  <!-- Input -->
  <rect x="50" y="60" width="120" height="50" class="sw"/>
  <text x="110" y="82" text-anchor="middle" class="label">H.264 码流</text>
  <text x="110" y="98" text-anchor="middle" class="small">CPU 内存</text>
  
  <!-- Arrow -->
  <line x1="170" y1="85" x2="210" y2="85" class="arrow"/>
  
  <!-- Parser -->
  <rect x="210" y="60" width="100" height="50" class="sw"/>
  <text x="260" y="82" text-anchor="middle" class="label">码流解析</text>
  <text x="260" y="98" text-anchor="middle" class="small">提取 NALU</text>
  
  <!-- Arrow -->
  <line x1="310" y1="85" x2="350" y2="85" class="arrow"/>
  
  <!-- GPU Memory --㸄
  <rect x="350" y="55" width="140" height="150" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" rx="6"/>
  <text x="420" y="75" text-anchor="middle" class="title">GPU 内存</text>
  
  <rect x="365" y="90" width="110" height="40" class="mem"/>
  <text x="420" y="108" text-anchor="middle" class="label">输入缓冲区</text>
  <text x="420" y="122" text-anchor="middle" class="small">H.264 NALU</text>
  
  <rect x="365" y="145" width="110" height="40" class="mem"/>
  <text x="420" y="163" text-anchor="middle" class="label">输出缓冲区</text>
  <text x="420" y="177" text-anchor="middle" class="small">YUV/NV12</text>
  
  <!-- Arrow to HW decoder -->
  <line x1="490" y1="110" x2="530" y2="110" class="arrow"/>
  
  <!-- Hardware Decoder -->
  <rect x="530" y="60" width="150" height="100" class="hw"/>
  <text x="605" y="82" text-anchor="middle" class="title">硬件解码器</text>
  
  <rect x="545" y="95" width="120" height="25" fill="#bfdbfe" stroke="#3b82f6" rx="2"/>
  <text x="605" y="111" text-anchor="middle" class="label" font-size="10">VLD (变长解码)</text>
  
  <rect x="545" y="125" width="120" height="25" fill="#bfdbfe" stroke="#3b82f6" rx="2"/>
  <text x="605" y="141" text-anchor="middle" class="label" font-size="10">iDCT + 运动补偿</text>
  
  <!-- Arrow back to GPU memory -->
  <line x1="605" y1="160" x2="605" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Platform Labels -->
  <rect x="530" y="175" width="150" height="60" fill="#fff" stroke="#3b82f6" stroke-width="1" rx="4"/>
  <text x="605" y="192" text-anchor="middle" class="label" font-size="10">平台实现：</text>
  <text x="605" y="208" text-anchor="middle" class="small">VideoToolbox (macOS/iOS)</text>
  <text x="605" y="222" text-anchor="middle" class="small">VAAPI (Linux) / NVDEC (NVIDIA)</text>
  
  <!-- Zero Copy Path -->
  <rect x="720" y="60" width="140" height="100" class="hw"/>
  <text x="790" y="82" text-anchor="middle" class="title">零拷贝输出</text>
  
  <rect x="735" y="95" width="110" height="25" fill="#bbf7d0" stroke="#22c55e" rx="2"/>
  <text x="790" y="111" text-anchor="middle" class="label" font-size="10">GPU 纹理</text>
  
  <rect x="735" y="125" width="110" height="25" fill="#bbf7d0" stroke="#22c55e" rx="2"/>
  <text x="790" y="141" text-anchor="middle" class="label" font-size="10">渲染/编码</text>
  
  <!-- Arrow -->
  <line x1="680" y1="145" x2="720" y2="145" class="arrow"/>
  <text x="700" y="135" class="small">零拷贝</text>
  
  <!-- Traditional Path (dashed) -->
  <path d="M 605 165 Q 605 230 605 250" class="dash" fill="none"/>
  <polygon points="602,245 605,255 608,245" fill="#94a3b8"/>
  
  <rect x="545" y="260" width="120" height="40" class="sw"/>
  <text x="605" y="278" text-anchor="middle" class="label">CPU 读取</text>
  <text x="605" y="292" text-anchor="middle" class="small">gpu→cpu 内存复制</text>
  
  <rect x="730" y="260" width="120" height="40" class="sw"/>
  <text x="790" y="278" text-anchor="middle" class="label">软件处理</text>
  <text x="790" y="292" text-anchor="middle" class="small">滤镜/渲染</text>
  
  <line x1="665" y1="280" x2="730" y2="280" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="697" y="270" class="small">慢路径</text>
  
  <!-- Comparison Table -->
  <rect x="50" y="330" width="400" height="100" class="box"/>
  <text x="250" y="350" text-anchor="middle" class="title">软件解码 vs 硬件解码</text>
  
  <!-- Table header -->
  <rect x="70" y="365" width="100" height="20" fill="#e2e8f0"/>
  <text x="120" y="378" text-anchor="middle" class="label" font-size="10">特性</text>
  
  <rect x="170" y="365" width="120" height="20" fill="#fef3c7"/>
  <text x="230" y="378" text-anchor="middle" class="label" font-size="10">软件解码 (x264)</text>
  
  <rect x="290" y="365" width="140" height="20" fill="#dbeafe"/>
  <text x="360" y="378" text-anchor="middle" class="label" font-size="10">硬件解码</text>
  
  <!-- Row 1 -->
  <text x="120" y="395" text-anchor="middle" class="label" font-size="10">CPU 占用</text>
  <text x="230" y="395" text-anchor="middle" class="small">60-80%</text>
  <text x="360" y="395" text-anchor="middle" class="small" fill="#22c55e">10-20%</text>
  
  <!-- Row 2 -->
  <text x="120" y="410" text-anchor="middle" class="label" font-size="10">功耗</text>
  <text x="230" y="410" text-anchor="middle" class="small">高 (CPU 发热)</text>
  <text x="360" y="410" text-anchor="middle" class="small" fill="#22c55e">低 (专用电路)</text>
  
  <!-- Row 3 -->
  <text x="120" y="425" text-anchor="middle" class="label" font-size="10">4K@60fps</text>
  <text x="230" y="425" text-anchor="middle" class="small">部分卡顿</text>
  <text x="360" y="425" text-anchor="middle" class="small" fill="#22c55e">流畅播放</text>
  
  <!-- Benefits -->
  <rect x="480" y="330" width="380" height="100" class="box"/>
  <text x="670" y="350" text-anchor="middle" class="title">硬件解码优势</text>
  
  <text x="500" y="370" class="label" font-size="11">✓ 零拷贝：GPU 内存 ↔ GPU 渲染，无需 CPU 介入</text>
  <text x="500" y="388" class="label" font-size="11">✓ 低延迟：专用电路并行处理</text>
  <text x="500" y="406" class="label" font-size="11">✓ 低功耗：适合移动设备</text>
  <text x="500" y="424" class="label" font-size="11">✓ 高吞吐：支持多路 4K 解码</text>
</svg>