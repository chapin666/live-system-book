<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="igrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388e3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pgrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb74d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">视频帧类型与 GOP 结构</text>
  
  <!-- 时间轴 -->
  <line x1="80" y1="350" x2="720" y2="350" stroke="#666" stroke-width="2"/>
  <text x="400" y="380" text-anchor="middle" font-size="12" fill="#666">时间 →</text>
  
  <!-- I 帧 -->
  <rect x="80" y="100" width="80" height="180" rx="4" fill="url(#igrad)" stroke="#2e7d32" stroke-width="2"/>
  <text x="120" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">I</text>
  <text x="120" y="165" text-anchor="middle" font-size="11" fill="#e8f5e9">关键帧</text>
  <text x="120" y="190" text-anchor="middle" font-size="10" fill="#c8e6c9">50 KB</text>
  <text x="120" y="215" text-anchor="middle" font-size="9" fill="#a5d6a7">完整编码</text>
  <text x="120" y="370" text-anchor="middle" font-size="11" fill="#666">t=0</text>
  
  <!-- P 帧 1 -->
  <rect x="180" y="130" width="70" height="150" rx="4" fill="url(#pgrad)" stroke="#e65100" stroke-width="2"/>
  <text x="215" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">P</text>
  <text x="215" y="195" text-anchor="middle" font-size="10" fill="#fff3e0">预测帧</text>
  <text x="215" y="218" text-anchor="middle" font-size="10" fill="#ffe0b2">12 KB</text>
  <text x="215" y="240" text-anchor="middle" font-size="9" fill="#ffcc80">参考 I</text>
  <text x="215" y="370" text-anchor="middle" font-size="11" fill="#666">t=33</text>
  
  <!-- B 帧 1 -->
  <rect x="270" y="155" width="60" height="125" rx="4" fill="url(#bgrad)" stroke="#0d47a1" stroke-width="2"/>
  <text x="300" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">B</text>
  <text x="300" y="212" text-anchor="middle" font-size="10" fill="#e3f2fd">双向帧</text>
  <text x="300" y="232" text-anchor="middle" font-size="10" fill="#bbdefb">5 KB</text>
  <text x="300" y="252" text-anchor="middle" font-size="9" fill="#90caf9">参考 I,P</text>
  <text x="300" y="370" text-anchor="middle" font-size="11" fill="#666">t=66</text>
  
  <!-- B 帧 2 -->
  <rect x="350" y="155" width="60" height="125" rx="4" fill="url(#bgrad)" stroke="#0d47a1" stroke-width="2"/>
  <text x="380" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">B</text>
  <text x="380" y="212" text-anchor="middle" font-size="10" fill="#e3f2fd">双向帧</text>
  <text x="380" y="232" text-anchor="middle" font-size="10" fill="#bbdefb">4 KB</text>
  <text x="380" y="252" text-anchor="middle" font-size="9" fill="#90caf9">参考 I,P</text>
  <text x="380" y="370" text-anchor="middle" font-size="11" fill="#666">t=100</text>
  
  <!-- P 帧 2 -->
  <rect x="430" y="130" width="70" height="150" rx="4" fill="url(#pgrad)" stroke="#e65100" stroke-width="2"/>
  <text x="465" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">P</text>
  <text x="465" y="195" text-anchor="middle" font-size="10" fill="#fff3e0">预测帧</text>
  <text x="465" y="218" text-anchor="middle" font-size="10" fill="#ffe0b2">10 KB</text>
  <text x="465" y="240" text-anchor="middle" font-size="9" fill="#ffcc80">参考 P</text>
  <text x="465" y="370" text-anchor="middle" font-size="11" fill="#666">t=133</text>
  
  <!-- B 帧 3 -->
  <rect x="520" y="155" width="60" height="125" rx="4" fill="url(#bgrad)" stroke="#0d47a1" stroke-width="2"/>
  <text x="550" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">B</text>
  <text x="550" y="212" text-anchor="middle" font-size="10" fill="#e3f2fd">双向帧</text>
  <text x="550" y="232" text-anchor="middle" font-size="10" fill="#bbdefb">6 KB</text>
  <text x="550" y="252" text-anchor="middle" font-size="9" fill="#90caf9">参考 P,P</text>
  <text x="550" y="370" text-anchor="middle" font-size="11" fill="#666">t=166</text>
  
  <!-- I 帧 2 -->
  <rect x="600" y="100" width="80" height="180" rx="4" fill="url(#igrad)" stroke="#2e7d32" stroke-width="2"/>
  <text x="640" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">I</text>
  <text x="640" y="165" text-anchor="middle" font-size="11" fill="#e8f5e9">关键帧</text>
  <text x="640" y="190" text-anchor="middle" font-size="10" fill="#c8e6c9">48 KB</text>
  <text x="640" y="215" text-anchor="middle" font-size="9" fill="#a5d6a7">完整编码</text>
  <text x="640" y="370" text-anchor="middle" font-size="11" fill="#666">t=200</text>
  
  <!-- 预测箭头 -->
  <!-- I0 到 P1 -->
  <path d="M 160 200 Q 170 250 180 205" stroke="#f57c00" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  
  <!-- I0 到 B1 -->
  <path d="M 160 180 Q 235 90 270 218" stroke="#1976d2" stroke-width="1.5" fill="none"/>
  
  <!-- P1 到 B1 -->
  <path d="M 250 180 Q 275 140 270 218" stroke="#1976d2" stroke-width="1.5" fill="none"/>
  
  <!-- P1 到 P2 -->
  <path d="M 250 205 Q 340 280 430 205" stroke="#f57c00" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  
  <!-- 图例 -->
  <rect x="50" y="400" width="700" height="40" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  
  <rect x="70" y="408" width="20" height="25" rx="3" fill="url(#igrad)" stroke="#2e7d32" stroke-width="1"/>
  <text x="100" y="425" font-size="11" fill="#333">I 帧：完整编码，可独立解码，用于快进/随机访问</text>
  
  <rect x="380" y="408" width="20" height="25" rx="3" fill="url(#pgrad)" stroke="#e65100" stroke-width="1"/>
  <text x="410" y="425" font-size="11" fill="#333">P 帧：参考前一帧，压缩率中等</text>
  
  <rect x="600" y="408" width="20" height="25" rx="3" fill="url(#bgrad)" stroke="#0d47a1" stroke-width="1"/>
  <text x="630" y="425" font-size="11" fill="#333">B 帧：参考前后帧，压缩率最高</text>
</svg>