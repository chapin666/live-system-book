<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .box { fill: #f0f9ff; stroke: #0369a1; stroke-width: 2; rx: 6; }
      .step { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; rx: 4; }
      .http { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 4; }
      .data { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 4; }
      .arrow { stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #334155; }
      .title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: bold; fill: #0f172a; }
      .small { font-size: 10px; fill: #64748b; }
      .code { font-family: monospace; font-size: 9px; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" class="title" font-size="18">网络播放器数据流</text>
  
  <!-- Step 1: Open URL -->
  <rect x="50" y="50" width="120" height="60" class="step"/>
  <text x="110" y="72" text-anchor="middle" class="label">1. 打开 URL</text>
  <text x="110" y="88" text-anchor="middle" class="small">解析地址</text>
  <text x="110" y="102" text-anchor="middle" class="small">获取文件大小</text>
  
  <!-- Arrow -->
  <line x1="170" y1="80" x2="200" y2="80" class="arrow"/>
  
  <!-- Step 2: HTTP Request -->
  <rect x="200" y="50" width="140" height="60" class="http"/>
  <text x="270" y="72" text-anchor="middle" class="label">2. HTTP 请求</text>
  <text x="270" y="90" text-anchor="middle" class="code">GET /video.mp4</text>
  <text x="270" y="102" text-anchor="middle" class="code">Range: bytes=0-</text>
  
  <!-- Arrow -->
  <line x1="340" y1="80" x2="370" y2="80" class="arrow"/>
  
  <!-- Step 3: Download -->
  <rect x="370" y="50" width="140" height="60" class="data"/
  <text x="440" y="72" text-anchor="middle" class="label">3. 下载数据</text>
  <text x="440" y="88" text-anchor="middle" class="small">异步下载</text>
  <text x="440" y="102" text-anchor="middle" class="small">写入缓冲区</text>
  
  <!-- Arrow -->
  <line x1="510" y1="80" x2="540" y2="80" class="arrow"/>
  
  <!-- Step 4: Buffer Check -->
  <rect x="540" y="50" width="140" height="60" class="step"/
  <text x="610" y="72" text-anchor="middle" class="label">4. 缓冲判断</text>
  <text x="610" y="88" text-anchor="middle" class="small">足够? 开始播放</text>
  <text x="610" y="102" text-anchor="middle" class="small">不足? 继续缓冲</text>
  
  <!-- Arrow -->
  <line x1="680" y1="80" x2="710" y2="80" class="arrow"/>
  
  <!-- Step 5: Decode & Play -->
  <rect x="710" y="50" width="140" height="60" class="data"/>
  <text x="780" y="72" text-anchor="middle" class="label">5. 解码播放</text>
  <text x="780" y="88" text-anchor="middle" class="small">FFmpeg 解码</text>
  <text x="780" y="102" text-anchor="middle" class="small">SDL 渲染</text>
  
  <!-- Loop arrow -->
  <path d="M 780 110 L 780 140 L 440 140 L 440 110" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="610" y="135" text-anchor="middle" class="small">循环: 持续下载 → 解码 → 播放</text>
  
  <!-- Seek Flow -->
  <rect x="50" y="170" width="800" height="140" class="box"/>
  <text x="450" y="195" text-anchor="middle" class="title">Seek 跳转流程</text>
  
  <!-- Seek steps -->
  <rect x="70" y="215" width="100" height="35" class="step"/
  <text x="120" y="237" text-anchor="middle" class="label">用户 Seek</text>
  
  <line x1="170" y1="232" x2="190" y2="232" class="arrow"/>
  
  <rect x="190" y="215" width="120" height="35" class="step"/
  <text x="250" y="237" text-anchor="middle" class="label">计算字节位置</text>
  
  <line x1="310" y1="232" x2="330" y2="232" class="arrow"/>
  
  <rect x="330" y="215" width="140" height="35" class="http"/
  <text x="400" y="237" text-anchor="middle" class="label">发送 Range 请求</text>
  
  <line x1="470" y1="232" x2="490" y2="232" class="arrow"/>
  
  <rect x="490" y="215" width="120" height="35" class="step"/
  <text x="550" y="237" text-anchor="middle" class="label">清空旧缓冲</text>
  
  <line x1="610" y1="232" x2="630" y2="232" class="arrow"/>
  
  <rect x="630" y="215" width="140" height="35" class="data"/>
  <text x="700" y="237" text-anchor="middle" class="label">从新位置播放</text>
  
  <!-- Range request detail -->
  <rect x="70" y="260" width="350" height="40" fill="#fffbeb" stroke="#f59e0b" rx="2"/>
  <text x="85" y="278" class="code">Range: bytes=1048576-2097151</text>
  <text x="85" y="290" class="small">← 跳转到 1MB 位置，请求 1MB 数据</text>
  
  <!-- Buffer management -->
  <rect x="50" y="330" width="400" height="150" class="box"/>
  <text x="250" y="355" text-anchor="middle" class="title">环形缓冲区管理</text>
  
  <!-- Buffer diagram -->
  <rect x="70" y="375" width="360" height="60" fill="#fff" stroke="#cbd5e1" rx="2"/>
  
  <rect x="75" y="380" width="40" height="50" fill="#22c55e" rx="2"/
  <rect x="118" y="380" width="40" height="50" fill="#22c55e" rx="2"/
  <rect x="161" y="380" width="40" height="50" fill="#22c55e" rx="2"/
  <rect x="204" y="380" width="40" height="50" fill="#22c55e" rx="2"/
  <rect x="247" y="380" width="40" height="50" fill="#f59e0b" rx="2"/
  <rect x="290" y="380" width="40" height="50" fill="#e2e8f0" rx="2"/
  <rect x="333" y="380" width="40" height="50" fill="#e2e8f0" rx="2"/
  
  <!-- Labels -->
  <text x="155" y="450" class="small">绿色 = 已缓冲可读</text>
  <text x="270" y="450" class="small">黄色 = 正在写入</text>
  <text x="350" y="450" class="small">灰色 = 空闲</text>
  
  <!-- Pointers -->
  <text x="90" y="410" class="small" fill="#dc2626">read</text>
  <text x="260" y="410" class="small" fill="#2563eb">write</text>
  
  <!-- HTTP response detail -->
  <rect x="480" y="330" width="370" height="150" class="box"/>
  <text x="665" y="355" text-anchor="middle" class="title">HTTP 响应处理</text>
  
  <text x="500" y="380" class="label">状态码处理:</text>
  
  <rect x="500" y="390" width="330" height="80" fill="#f8fafc" stroke="#e2e8f0" rx="2"/>
  
  <text x="510" y="410" class="code">200 OK</text>
  <text x="580" y="410" class="small">→ 普通下载，无 Range 支持</text>
  
  <text x="510" y="430" class="code">206 Partial Content</text>
  <text x="660" y="430" class="small">→ Range 请求成功，支持断点续传</text>
  
  <text x="510" y="450" class="code">416 Range Not Satisfiable</text>
  <text x="710" y="450" class="small">→ 范围无效，回退普通下载</text>
  
  <text x="510" y="470" class="code">301/302</text>
  <text x="600" y="470" class="small">→ 跟随重定向</text>
</svg>