<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <!-- Background -->
  <rect width="900" height="600" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">ICE连接状态机</text>
  
  <!-- Main State Machine Area -->
  <g transform="translate(50, 60)">
    <rect width="520" height="520" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="260" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">ICE Agent状态流转</text>
    
    <!-- States -->
    <!-- NEW State -->
    <g transform="translate(210, 60)">
      <rect width="100" height="60" fill="#90caf9" stroke="#1976d2" stroke-width="2" rx="30"/>
      <text x="50" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">NEW</text>
      <text x="50" y="45" text-anchor="middle" font-size="9" fill="#1565c0">初始状态</text>
    </g>
    
    <!-- GATHERING State -->
    <g transform="translate(60, 150)">
      <rect width="120" height="60" fill="#81d4fa" stroke="#0288d1" stroke-width="2" rx="30"/>
      <text x="60" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#01579b">GATHERING</text>
      <text x="60" y="45" text-anchor="middle" font-size="9" fill="#0277bd">收集候选中</text>
    </g>
    
    <!-- CHECKING State -->
    <g transform="translate(340, 150)">
      <rect width="120" height="60" fill="#80cbc4" stroke="#00897b" stroke-width="2" rx="30"/>
      <text x="60" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#004d40">CHECKING</text>
      <text x="60" y="45" text-anchor="middle" font-size="9" fill="#00695c">连通性检测</text>
    </g>
    
    <!-- CONNECTED State -->
    <g transform="translate(340, 260)">
      <rect width="120" height="60" fill="#a5d6a7" stroke="#388e3c" stroke-width="2" rx="30"/>
      <text x="60" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">CONNECTED</text>
      <text x="60" y="45" text-anchor="middle" font-size="9" fill="#2e7d32">已连接</text>
    </g>
    
    <!-- COMPLETED State -->
    <g transform="translate(340, 370)">
      <rect width="120" height="60" fill="#66bb6a" stroke="#2e7d32" stroke-width="2" rx="30"/>
      <text x="60" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">COMPLETED</text>
      <text x="60" y="45" text-anchor="middle" font-size="9" fill="#e8f5e9">完成</text>
    </g>
    
    <!-- DISCONNECTED State -->
    <g transform="translate(60, 260)">
      <rect width="120" height="60" fill="#ffcc80" stroke="#f57c00" stroke-width="2" rx="30"/>
      <text x="60" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">DISCONNECTED</text>
      <text x="60" y="45" text-anchor="middle" font-size="9" fill="#ef6c00">连接断开</text>
    </g>
    
    <!-- FAILED State -->
    <g transform="translate(60, 370)">
      <rect width="120" height="60" fill="#ef9a9a" stroke="#c62828" stroke-width="2" rx="30"/>
      <text x="60" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">FAILED</text>
      <text x="60" y="45" text-anchor="middle" font-size="9" fill="#c62828">失败</text>
    </g>
    
    <!-- CLOSED State -->
    <g transform="translate(200, 440)">
      <rect width="120" height="60" fill="#bdbdbd" stroke="#616161" stroke-width="2" rx="30"/>
      <text x="60" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#212121">CLOSED</text>
      <text x="60" y="45" text-anchor="middle" font-size="9" fill="#424242">关闭</text>
    </g>
    
    <!-- Transition Arrows -->
    <!-- NEW -> GATHERING -->
    <path d="M230 120 L150 150" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow1)"/>
    <text x="175" y="125" font-size="9" fill="#666">gather()</text>
    
    <!-- NEW -> CHECKING -->
    <path d="M290 120 L370 150" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow1)"/>
    <text x="345" y="125" font-size="9" fill="#666">start()</text>
    
    <!-- GATHERING -> CHECKING -->
    <path d="M180 180 L340 180" stroke="#0288d1" stroke-width="2" marker-end="url(#arrow2)"/>
    <text x="260" y="172" text-anchor="middle" font-size="9" fill="#555">候选收集完成</text>
    
    <!-- CHECKING -> CONNECTED -->
    <path d="M400 210 L400 260" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow3)"/>
    <text x="435" y="235" font-size="9" fill="#4caf50">找到有效候选对</text>
    
    <!-- CHECKING -> FAILED -->
    <path d="M340 200 L180 370" stroke="#c62828" stroke-width="2" marker-end="url(#arrow4)"/>
    <text x="230" y="300" font-size="9" fill="#e53935">所有检测失败</text>
    
    <!-- CONNECTED -> COMPLETED -->
    <path d="M400 320 L400 370" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow5)"/>
    <text x="435" y="345" font-size="9" fill="#4caf50">ICE提名完成</text>
    
    <!-- CONNECTED -> DISCONNECTED -->
    <path d="M340 290 L180 290" stroke="#f57c00" stroke-width="2" marker-end="url(#arrow6)"/>
    <text x="260" y="282" text-anchor="middle" font-size="9" fill="#ff9800">连接丢失</text>
    
    <!-- DISCONNECTED -> FAILED -->
    <path d="M120 320 L120 370" stroke="#c62828" stroke-width="2" marker-end="url(#arrow4)"/>
    <text x="85" y="350" font-size="9" fill="#e53935">超时未恢复</text>
    
    <!-- DISCONNECTED -> CONNECTED -->
    <path d="M180 290 L340 290" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow3)" stroke-dasharray="4"/>
    <text x="260" y="308" text-anchor="middle" font-size="9" fill="#4caf50">恢复连接</text>
    
    <!-- COMPLETED -> CLOSED -->
    <path d="M380 430 L320 470" stroke="#616161" stroke-width="2" marker-end="url(#arrow7)"/>
    <text x="370" y="465" font-size="9" fill="#757575">close()</text>
    
    <!-- FAILED -> CLOSED -->
    <path d="M180 430 L200 470" stroke="#616161" stroke-width="2" marker-end="url(#arrow7)"/>
    <text x="160" y="465" font-size="9" fill="#757575">close()</text>
    
    <!-- Any -> CLOSED (from states) -->
    <path d="M260 500 L260 520" stroke="#616161" stroke-width="2" marker-end="url(#arrow7)"/>
  </g>
  
  <!-- State Descriptions -->
  <g transform="translate(600, 60)">
    <rect width="250" height="520" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" rx="8"/>
    <text x="125" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#616161">状态说明</text>
    
    <!-- Description Items -->
    <g transform="translate(15, 50)">
      <rect width="220" height="65" fill="#90caf9" stroke="#1976d2" stroke-width="1" rx="4"/>
      <text x="110" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#0d47a1">NEW</text>
      <text x="110" y="38" text-anchor="middle" font-size="9" fill="#555">ICE代理刚创建，尚未开始</text>
      <text x="110" y="55" text-anchor="middle" font-size="9" fill="#555">收集本地候选或进行连接检查</text>
    </g>
    
    <g transform="translate(15, 125)">
      <rect width="220" height="50" fill="#81d4fa" stroke="#0288d1" stroke-width="1" rx="4"/>
      <text x="110" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#01579b">GATHERING</text>
      <text x="110" y="35" text-anchor="middle" font-size="9" fill="#555">正在收集主机/反射/中继候选</text>
    </g>
    
    <g transform="translate(15, 185)">
      <rect width="220" height="65" fill="#80cbc4" stroke="#00897b" stroke-width="1" rx="4"/>
      <text x="110" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#004d40">CHECKING</text>
      <text x="110" y="38" text-anchor="middle" font-size="9" fill="#555">进行连通性检查(Connectivity Check)</text>
      <text x="110" y="55" text-anchor="middle" font-size="9" fill="#555">STUN Binding Request/Response</text>
    </g>
    
    <g transform="translate(15, 260)">
      <rect width="220" height="50" fill="#a5d6a7" stroke="#388e3c" stroke-width="1" rx="4"/>
      <text x="110" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">CONNECTED</text>
      <text x="110" y="35" text-anchor="middle" font-size="9" fill="#555">找到有效候选对，媒体可传输</text>
    </g>
    
    <g transform="translate(15, 320)">
      <rect width="220" height="50" fill="#66bb6a" stroke="#2e7d32" stroke-width="1" rx="4"/>
      <text x="110" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">COMPLETED</text>
      <text x="110" y="35" text-anchor="middle" font-size="9" fill="#555">ICE提名完成，连接稳定</text>
    </g>
    
    <g transform="translate(15, 380)">
      <rect width="220" height="50" fill="#ffcc80" stroke="#f57c00" stroke-width="1" rx="4"/>
      <text x="110" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">DISCONNECTED</text>
      <text x="110" y="35" text-anchor="middle" font-size="9" fill="#555">连接暂时中断，尝试恢复</text>
    </g>
    
    <g transform="translate(15, 440)">
      <rect width="220" height="50" fill="#ef9a9a" stroke="#c62828" stroke-width="1" rx="4"/>
      <text x="110" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">FAILED</text>
      <text x="110" y="35" text-anchor="middle" font-size="9" fill="#555">所有候选对检测失败</text>
    </g>
  </g>
  
  <!-- Bottom Legend -->
  <g transform="translate(50, 590)">
    <text x="0" y="0" font-size="10" fill="#666">ICE (Interactive Connectivity Establishment) - RFC 5245/8445 | 基于STUN/TURN协议实现NAT穿透</text>
  </g>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0288d1"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32"/>
    </marker>
    <marker id="arrow6" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f57c00"/>
    </marker>
    <marker id="arrow7" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#616161"/>
    </marker>
  </defs>
</svg>