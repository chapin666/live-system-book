<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">P2P 连接建立完整流程</text>
  
  <!-- Actors -->
  <rect x="50" y="60" width="120" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="110" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1976d2">客户端 A</text>
  
  <rect x="630" y="60" width="120" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="690" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1976d2">客户端 B</text>
  
  <rect x="340" y="60" width="120" height="40" rx="5" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f57c00">信令服务器</text>
  
  <!-- Vertical lines -->
  <line x1="110" y1="100" x2="110" y2="550" stroke="#ddd" stroke-width="1"/>
  <line x1="400" y1="100" x2="400" y2="550" stroke="#ddd" stroke-width="1"/>
  <line x1="690" y1="100" x2="690" y2="550" stroke="#ddd" stroke-width="1"/>
  
  <!-- Phase 1: Signaling -->
  <text x="20" y="125" font-family="Arial, sans-serif" font-size="12" fill="#666" font-weight="bold">Phase 1</text>
  <text x="20" y="140" font-family="Arial, sans-serif" font-size="10" fill="#999">信令交换</text>
  
  <!-- A -> Signaling: Offer -->
  <line x1="110" y1="155" x2="400" y2="155" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="220" y="145" width="70" height="18" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="255" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1976d2">SDP Offer</text>
  
  <!-- Signaling -> B: Offer -->
  <line x1="400" y1="175" x2="690" y2="175" stroke="#f57c00" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="510" y="165" width="70" height="18" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
  <text x="545" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f57c00">SDP Offer</text>
  
  <!-- B -> Signaling: Answer -->
  <line x1="690" y1="195" x2="400" y2="195" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="510" y="185" width="70" height="18" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="545" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1976d2">SDP Answer</text>
  
  <!-- Signaling -> A: Answer -->
  <line x1="400" y1="215" x2="110" y2="215" stroke="#f57c00" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="220" y="205" width="70" height="18" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
  <text x="255" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f57c00">SDP Answer</text>
  
  <!-- Phase 2: ICE -->
  <text x="20" y="250" font-family="Arial, sans-serif" font-size="12" fill="#666" font-weight="bold">Phase 2</text>
  <text x="20" y="265" font-family="Arial, sans-serif" font-size="10" fill="#999">ICE 探测</text>
  
  <!-- A -> STUN -->
  <line x1="110" y1="280" x2="110" y2="300" stroke="#4caf50" stroke-width="2"/>
  <rect x="60" y="305" width="100" height="18" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="110" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4caf50">STUN 请求</text>
  
  <!-- B -> STUN -->
  <line x1="690" y1="280" x2="690" y2="300" stroke="#4caf50" stroke-width="2"/>
  <rect x="640" y="305" width="100" height="18" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="690" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4caf50">STUN 请求</text>
  
  <!-- ICE candidates exchange -->
  <line x1="110" y1="335" x2="400" y2="335" stroke="#9c27b0" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-purple)"/>
  <rect x="220" y="325" width="70" height="18" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
  <text x="255" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9c27b0">ICE Candidate</text>
  
  <line x1="690" y1="355" x2="400" y2="355" stroke="#9c27b0" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-purple)"/>
  <rect x="510" y="345" width="70" height="18" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
  <text x="545" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9c27b0">ICE Candidate</text>
  
  <!-- Phase 3: Connectivity Check -->
  <text x="20" y="395" font-family="Arial, sans-serif" font-size="12" fill="#666" font-weight="bold">Phase 3</text>
  <text x="20" y="410" font-family="Arial, sans-serif" font-size="10" fill="#999">连通性检测</text>
  
  <!-- A -> B: Binding Request -->
  <line x1="110" y1="430" x2="690" y2="430" stroke="#e91e63" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow-pink)"/>
  <rect x="365" y="420" width="70" height="18" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
  <text x="400" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e91e63">Binding Request</text>
  
  <!-- B -> A: Binding Response -->
  <line x1="690" y1="455" x2="110" y2="455" stroke="#e91e63" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow-pink)"/>
  <rect x="365" y="445" width="70" height="18" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
  <text x="400" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e91e63">Binding Success</text>
  
  <!-- Phase 4: Connected -->
  <text x="20" y="495" font-family="Arial, sans-serif" font-size="12" fill="#666" font-weight="bold">Phase 4</text>
  <text x="20" y="510" font-family="Arial, sans-serif" font-size="10" fill="#999">连接建立</text>
  
  <!-- P2P Data Flow -->
  <rect x="250" y="520" width="300" height="25" rx="12" fill="#c8e6c9" stroke="#4caf50" stroke-width="2"/>
  <text x="400" y="537" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2e7d32" font-weight="bold">P2P 连接建立成功 - 媒体数据传输</text>
  
  <line x1="110" y1="550" x2="690" y2="550" stroke="#4caf50" stroke-width="3"/>
  
  <!-- Markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f57c00"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#9c27b0"/>
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e91e63"/>
    </marker>
  </defs>
</svg>