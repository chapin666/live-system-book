<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <style>
      .box { fill: #f0f9ff; stroke: #0369a1; stroke-width: 2; rx: 6; }
      .process { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; rx: 4; }
      .input { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 4; }
      .output { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 4; }
      .frame { fill: #fce7f3; stroke: #ec4899; stroke-width: 2; rx: 4; }
      .arrow { stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #334155; }
      .title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: bold; fill: #0f172a; }
      .small { font-size: 10px; fill: #64748b; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" class="title" font-size="18">H.264 编码流程</text>
  
  <!-- Input Frame -->
  <rect x="50" y="60" width="100" height="80" class="input"/>
  <text x="100" y="85" text-anchor="middle" class="label">原始帧</text>
  <text x="100" y="105" text-anchor="middle" class="small">YUV420P</text>
  <text x="100" y="120" text-anchor="middle" class="small">1920×1080</text>
  
  <!-- Arrow -->
  <line x1="150" y1="100" x2="180" y2="100" class="arrow"/>
  
  <!-- Macroblock Split -->
  <rect x="180" y="60" width="120" height="80" class="process"/>
  <text x="240" y="85" text-anchor="middle" class="label">宏块分割</text>
  <text x="240" y="105" text-anchor="middle" class="small">16×16 宏块</text>
  <text x="240" y="120" text-anchor="middle" class="small">8×8 / 4×4 子块</text>
  
  <!-- Arrow -->
  <line x1="300" y1="100" x2="330" y2="100" class="arrow"/>
  
  <!-- Prediction -->
  <rect x="330" y="60" width="140" height="80" class="process"/>
  <text x="400" y="85" text-anchor="middle" class="label">预测</text>
  <text x="400" y="105" text-anchor="middle" class="small">帧内预测 (I帧)</text>
  <text x="400" y="120" text-anchor="middle" class="small">帧间预测 (P/B帧)</text>
  
  <!-- Arrow -->
  <line x1="470" y1="100" x2="500" y2="100" class="arrow"/>
  
  <!-- Residual -->
  <rect x="500" y="60" width="100" height="80" class="frame"/>
  <text x="550" y="85" text-anchor="middle" class="label">残差</text>
  <text x="550" y="105" text-anchor="middle" class="small">原始 − 预测</text>
  <text x="550" y="120" text-anchor="middle" class="small">大部分为零</text>
  
  <!-- Arrow -->
  <line x1="600" y1="100" x2="630" y2="100" class="arrow"/>
  
  <!-- DCT -->
  <rect x="630" y="60" width="100" height="80" class="process"/>
  <text x="680" y="85" text-anchor="middle" class="label">DCT 变换</text>
  <text x="680" y="105" text-anchor="middle" class="small">空间 → 频域</text>
  <text x="680" y="120" text-anchor="middle" class="small">能量集中</text>
  
  <!-- Arrow -->
  <line x1="730" y1="100" x2="760" y2="100" class="arrow"/>
  
  <!-- Quantization -->
  <rect x="760" y="60" width="110" height="80" class="process"/>
  <text x="815" y="85" text-anchor="middle" class="label">量化</text>
  <text x="815" y="105" text-anchor="middle" class="small">降低精度</text>
  <text x="815" y="120" text-anchor="middle" class="small">高频归零</text>
  
  <!-- Arrow down -->
  <path d="M 815 140 L 815 170" class="arrow"/>
  
  <!-- Entropy Coding -->
  <rect x="730" y="180" width="140" height="70" class="process"/>
  <text x="800" y="205" text-anchor="middle" class="label">熵编码</text>
  <text x="800" y="225" text-anchor="middle" class="small">CABAC / CAVLC</text>
  <text x="800" y="240" text-anchor="middle" class="small">进一步压缩</text>
  
  <!-- Arrow left -->
  <path d="M 730 215 L 680 215 L 680 280" class="arrow"/>
  
  <!-- Output -->
  <rect x="600" y="280" width="140" height="70" class="output"/>
  <text x="670" y="305" text-anchor="middle" class="label">H.264 码流</text>
  <text x="670" y="325" text-anchor="middle" class="small">NALU 单元</text>
  <text x="670" y="340" text-anchor="middle" class="small">压缩率 100-200x</text>
  
  <!-- Frame Types Detail -->
  <rect x="50" y="180" width="550" height="120" class="box"/>
  <text x="325" y="205" text-anchor="middle" class="title">帧类型详解</text>
  
  <!-- I Frame -->
  <rect x="70" y="220" width="150" height="70" fill="#fecaca" stroke="#ef4444" rx="4"/>
  <text x="145" y="245" text-anchor="middle" class="label">I 帧 (关键帧)</text>
  <text x="145" y="265" text-anchor="middle" class="small">帧内编码</text>
  <text x="145" y="280" text-anchor="middle" class="small">独立解码 / 场景切换</text>
  
  <!-- P Frame -->
  <rect x="245" y="220" width="150" height="70" fill="#fef3c7" stroke="#f59e0b" rx="4"/>
  <text x="320" y="245" text-anchor="middle" class="label">P 帧 (前向预测)</text>
  <text x="320" y="265" text-anchor="middle" class="small">参考前面的 I/P 帧</text>
  <text x="320" y="280" text-anchor="middle" class="small">运动向量 + 残差</text>
  
  <!-- B Frame -->
  <rect x="420" y="220" width="150" height="70" fill="#dbeafe" stroke="#3b82f6" rx="4"/>
  <text x="495" y="245" text-anchor="middle" class="label">B 帧 (双向预测)</text>
  <text x="495" y="265" text-anchor="middle" class="small">参考前后帧</text>
  <text x="495" y="280" text-anchor="middle" class="small">压缩率最高 / 延迟大</text>
  
  <!-- GOP Structure -->
  <rect x="50" y="320" width="550" height="100" class="box"/>
  <text x="325" y="345" text-anchor="middle" class="title">GOP 结构示例 (直播)</text>
  
  <!-- GOP timeline -->
  <rect x="70" y="365" width="40" height="40" fill="#fecaca" stroke="#ef4444" rx="2"/>
  <text x="90" y="390" text-anchor="middle" class="label">I</text>
  
  <rect x="115" y="365" width="40" height="40" fill="#fef3c7" stroke="#f59e0b" rx="2"/>
  <text x="135" y="390" text-anchor="middle" class="label">P</text>
  
  <rect x="160" y="365" width="40" height="40" fill="#fef3c7" stroke="#f59e0b" rx="2"/>
  <text x="180" y="390" text-anchor="middle" class="label">P</text>
  
  <rect x="205" y="365" width="40" height="40" fill="#fef3c7" stroke="#f59e0b" rx="2"/>
  <text x="225" y="390" text-anchor="middle" class="label">P</text>
  
  <text x="260" y="390" class="small">... (更多 P 帧)</text>
  
  <rect x="340" y="365" width="40" height="40" fill="#fecaca" stroke="#ef4444" rx="2"/>
  <text x="360" y="390" text-anchor="middle" class="label">I</text>
  
  <rect x="385" y="365" width="40" height="40" fill="#fef3c7" stroke="#f59e0b" rx="2"/>
  <text x="405" y="390" text-anchor="middle" class="label">P</text>
  
  <text x="70" y="420" class="small">GOP Size = 30 帧 (1秒@30fps) | 直播推荐 I+P 帧，禁用 B 帧以降低延迟</text>
  
  <!-- Compression Ratio -->
  <rect x="620" y="370" width="250" height="160" class="box"/>
  <text x="745" y="395" text-anchor="middle" class="title">压缩效果对比</text>
  
  <text x="640" y="420" class="label" font-size="11">1080p@30fps YUV420P:</text>
  <text x="640" y="440" class="small">原始: 1920 × 1080 × 1.5 × 30</text>
  <text x="640" y="455" class="small">     = 93 MB/s</text>
  
  <text x="640" y="480" class="label" font-size="11">H.264 编码后:</text>
  <text x="640" y="500" class="small">码率: 4 Mbps = 0.5 MB/s</text>
  <text x="640" y="515" class="small">压缩率: 93 / 0.5 = </text>
  <text x="750" y="515" class="label" fill="#22c55e">186倍</text>
</svg>