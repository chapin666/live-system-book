<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="520" fill="#fafafa"/>
  
  <text x="450" y="35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#333">视频布局类型</text>
  
  <!-- 网格布局 -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="260" height="200" rx="10" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
    
    <text x="130" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2e7d32">网格布局 (Gallery)</text>
    
    <!-- 2x2 网格示例 -->
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="105" height="65" rx="4" fill="white" stroke="#4caf50" stroke-width="1"/>
      <circle cx="52" cy="32" r="12" fill="#c8e6c9"/>
      <text x="52" y="37" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2e7d32">A</text>
      
      <rect x="115" y="0" width="105" height="65" rx="4" fill="white" stroke="#4caf50" stroke-width="1"/>
      <circle cx="167" cy="32" r="12" fill="#c8e6c9"/>
      <text x="167" y="37" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2e7d32">B</text>
      
      <rect x="0" y="75" width="105" height="65" rx="4" fill="white" stroke="#4caf50" stroke-width="1"/>
      <circle cx="52" cy="107" r="12" fill="#c8e6c9"/>
      <text x="52" y="112" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2e7d32">C</text>
      
      <rect x="115" y="75" width="105" height="65" rx="4" fill="white" stroke="#4caf50" stroke-width="1"/>
      <circle cx="167" cy="107" r="12" fill="#c8e6c9"/>
      <text x="167" y="112" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2e7d32">D</text>
    </g>
    
    <text x="130" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">适用：≤ 9 人的平等会议</text>
  </g>
  
  <!-- 主讲人模式 -->
  <g transform="translate(320, 60)">
    <rect x="0" y="0" width="260" height="200" rx="10" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
    
    <text x="130" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1976d2">主讲人模式 (Speaker)</text>
    
    <g transform="translate(20, 45)">
      <!-- 主讲人大图 -->
      <rect x="0" y="0" width="220" height="95" rx="4" fill="white" stroke="#2196f3" stroke-width="2"/>
      <circle cx="110" cy="47" r="20" fill="#bbdefb"/>
      <text x="110" y="53" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1976d2">主讲人</text>
      
      <!-- 缩略图 -->
      <rect x="0" y="105" width="70" height="45" rx="4" fill="white" stroke="#90caf9" stroke-width="1"/>
      <circle cx="35" cy="127" r="8" fill="#e3f2fd"/>
      <rect x="75" y="105" width="70" height="45" rx="4" fill="white" stroke="#90caf9" stroke-width="1"/>
      <circle cx="110" cy="127" r="8" fill="#e3f2fd"/>
      <rect x="150" y="105" width="70" height="45" rx="4" fill="white" stroke="#90caf9" stroke-width="1"/>
      <circle cx="185" cy="127" r="8" fill="#e3f2fd"/>
    </g>
    
    <text x="130" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">适用：讲座、培训、汇报</text>
  </g>
  
  <!-- PIP 模式 -->
  <g transform="translate(590, 60)">
    <rect x="0" y="0" width="260" height="200" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    
    <text x="130" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e65100">画中画模式 (PIP)</text>
    
    <g transform="translate(20, 45)">
      <!-- 远端大图 -->
      <rect x="0" y="0" width="220" height="130" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
      <circle cx="110" cy="65" r="18" fill="#ffe0b2"/>
      <text x="110" y="70" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e65100">远端</text>
      
      <!-- 自己小窗口 -->
      <rect x="135" y="75" width="75" height="50" rx="4" fill="white" stroke="#ff9800" stroke-width="2"/>
      <circle cx="172" cy="100" r="10" fill="#ffcc80"/>
      <text x="172" y="104" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e65100">自己</text>
    </g>
    
    <text x="130" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">适用：1对1通话、面试</text>
  </g>
  
  <!-- 布局切换流程 -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="800" height="220" rx="10" fill="white" stroke="#ddd" stroke-width="1"/>
    
    <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">布局切换决策流程</text>
    
    <!-- 流程图 -->
    <g transform="translate(50, 50)">
      <rect x="0" y="20" width="100" height="50" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
      <text x="50" y="40" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">人数变化</text>
      <text x="50" y="55" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">或主讲人切换</text>
      
      <path d="M 100 45 L 140 45" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow-gray)"/>
      
      <rect x="150" y="20" width="120" height="50" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
      <text x="210" y="40" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">人数 ≤ 4 ?</text>
      <text x="210" y="55" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1976d2">网格布局</text>
      
      <path d="M 210 70 L 210 90" stroke="#2196f3" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
      <text x="230" y="85" font-family="sans-serif" font-size="9" fill="#666">否</text>
      
      <rect x="150" y="100" width="120" height="50" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
      <text x="210" y="120" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">有明确主讲人?</text>
      <text x="210" y="135" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e65100">主讲人模式</text>
      
      <path d="M 270 125 L 310 125" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow-gray)"/>
      
      <text x="285" y="115" font-family="sans-serif" font-size="9" fill="#666">否</text>
      
      <rect x="320" y="100" width="120" height="50" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
      <text x="380" y="120" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">1对1通话?</text>
      <text x="380" y="135" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2e7d32">PIP 模式</text>
      
      <path d="M 380 150 L 380 170" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow-gray)"/>
      
      <rect x="320" y="175" width="120" height="35" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
      <text x="380" y="197" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">分页网格</text>
    </g>
  </g>
  
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2196f3"/>
    </marker>
  </defs>
</svg>