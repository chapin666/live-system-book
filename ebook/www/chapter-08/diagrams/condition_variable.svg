<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="550" fill="#fafafa"/>
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    条件变量 (Condition Variable) 工作流程
  </text>
  
  
  <!-- ========== 消费者等待流程 ========== -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="350" height="230" fill="#e3f2fd" stroke="#2196F3" stroke-width="2" rx="5"/>
    <text x="175" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565C0">消费者 (Consumer)</text>
    
    <!-- 流程 -->
    <rect x="20" y="40" width="100" height="30" fill="#64B5F6" rx="3"/>
    <text x="70" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">1. lock(mutex)</text>
    
    <rect x="20" y="80" width="100" height="30" fill="#64B5F6" rx="3"/>
    <text x="70" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">wait(lock, pred)</text>
    
    <rect x="20" y="120" width="100" height="30" fill="#FFB74D" rx="3"/>
    <text x="70" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">3. 阻塞等待</text>
    
    <rect x="150" y="120" width="100" height="30" fill="#81C784" rx="3"/>
    <text x="200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">4. 被唤醒</text>
    
    <rect x="20" y="170" width="100" height="30" fill="#64B5F6" rx="3"/>
    <text x="70" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">5. 处理数据</text>
    
    <rect x="150" y="170" width="100" height="30" fill="#ef5350" rx="3"/>
    <text x="200" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">6. unlock</text>
    
    <!-- 箭头 -->
    <line x1="70" y1="70" x2="70" y2="80" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="70" y1="110" x2="70" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="120" y1="135" x2="150" y2="135" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="70" y1="150" x2="70" y2="170" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <text x="175" y="100" font-family="Arial, sans-serif" font-size="9" fill="#666">自动释放锁</text>
    <text x="175" y="115" font-family="Arial, sans-serif" font-size="9" fill="#666">原子操作</text>
  </g>
  
  
  <!-- ========== 队列状态 ========== -->
  <g transform="translate(420, 60)">
    <rect x="0" y="0" width="330" height="100" fill="#f3e5f5" stroke="#9C27B0" stroke-width="2" rx="5"/>
    <text x="165" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7B1FA2">队列状态</text>
    
    <!-- 条件变量 -->
    <rect x="20" y="45" width="100" height="40" fill="#CE93D8" rx="3"/>
    <text x="70" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">not_empty_</text>
    <text x="70" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">队列非空</text>
    
    <rect x="140" y="45" width="80" height="40" fill="#BA68C8" rx="3"/>
    <text x="180" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">mutex</text>
    <text x="180" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">保护队列</text>
    
    <rect x="240" y="45" width="80" height="40" fill="#CE93D8" rx="3"/>
    <text x="280" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">not_full_</text>
    <text x="280" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">队列非满</text>
  </g>
  
  
  <!-- ========== 生产者通知流程 ========== -->
  <g transform="translate(420, 180)">
    <rect x="0" y="0" width="330" height="110" fill="#fff3e0" stroke="#FF9800" stroke-width="2" rx="5"/>
    <text x="165" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E65100">生产者 (Producer)</text>
    
    <!-- 流程 -->
    <rect x="20" y="40" width="80" height="25" fill="#FFB74D" rx="3"/>
    <text x="60" y="57" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">lock(mutex)</text>
    
    <rect x="110" y="40" width="80" height="25" fill="#FFB74D" rx="3"/>
    <text x="150" y="57" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">入队数据</text>
    
    <rect x="200" y="40" width="80" height="25" fill="#81C784" rx="3"/>
    <text x="240" y="57" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">notify_one()</text>
    
    <rect x="110" y="75" width="80" height="25" fill="#ef5350" rx="3"/>
    <text x="150" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">unlock</text>
    
    <!-- 箭头 -->
    <line x1="100" y1="52" x2="110" y2="52" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="190" y1="52" x2="200" y2="52" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
  
  
  <!-- ========== 虚假唤醒 ========== -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="700" height="80" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="350" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c62828">⚠️ 虚假唤醒 (Spurious Wakeup)</text>
    
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="11" fill="#333">问题: wait() 可能在条件不满足时被唤醒</text>
    
    <text x="20" y="68" font-family="monospace" font-size="11" fill="#d32f2f">解决: 总是使用带谓词的 wait 版本 — cv.wait(lock, [] { return condition; })</text>
  </g>
  
  
  <!-- ========== 代码示例 ========== -->
  <g transform="translate(50, 410)">
    <rect x="0" y="0" width="340" height="120" fill="#263238" rx="5"/>
    <text x="10" y="20" font-family="monospace" font-size="11" fill="#fff">// 消费者</text>
    <text x="10" y="40" font-family="monospace" font-size="10" fill="#82B1FF">std::unique_lock<std::mutex></text><text x="220" y="40" font-family="monospace" font-size="10" fill="#fff"> lock(mutex);</text>
    <text x="10" y="60" font-family="monospace" font-size="10" fill="#9CCC65">not_empty_.wait(lock, [this] {</text>
    <text x="30" y="78" font-family="monospace" font-size="10" fill="#9CCC65">return !queue_.empty();</text>
    <text x="10" y="95" font-family="monospace" font-size="10" fill="#9CCC65">});</text>
    <text x="10" y="112" font-family="monospace" font-size="10" fill="#fff">item = queue_.front(); queue_.pop();</text>
  </g>
  
  <g transform="translate(410, 410)">
    <rect x="0" y="0" width="340" height="120" fill="#263238" rx="5"/>
    <text x="10" y="20" font-family="monospace" font-size="11" fill="#fff">// 生产者</text>
    <text x="10" y="40" font-family="monospace" font-size="10" fill="#82B1FF">std::lock_guard<std::mutex></text><text x="220" y="40" font-family="monospace" font-size="10" fill="#fff"> lock(mutex);</text>
    <text x="10" y="60" font-family="monospace" font-size="10" fill="#fff">queue_.push(item);</text>
    <text x="10" y="85" font-family="monospace" font-size="10" fill="#FFB74D">not_empty_.notify_one();  // 唤醒消费者</text>
    <text x="10" y="105" font-family="monospace" font-size="10" fill="#90a4ae">// lock 自动释放</text>
  </g>
</svg>
