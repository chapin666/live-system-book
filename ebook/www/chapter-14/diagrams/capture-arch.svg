<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>
  
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">屏幕采集 vs 摄像头采集</text>
  
  <!-- Camera Capture -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="320" height="320" fill="#fff" stroke="#4a90d9" stroke-width="2" rx="10"/>
    <text x="160" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#4a90d9">摄像头采集</text>
    
    <!-- Camera icon -->
    <rect x="110" y="60" width="100" height="70" fill="#e3f2fd" stroke="#4a90d9" stroke-width="2" rx="5"/>
    <circle cx="160" cy="95" r="25" fill="#4a90d9"/>
    <circle cx="160" cy="95" r="15" fill="#fff"/>
    <circle cx="185" cy="75" r="5" fill="#ff5722"/>
    
    <!-- Specs -->
    <text x="20" y="160" font-size="12" fill="#333">数据源：摄像头设备驱动</text>
    <text x="20" y="185" font-size="12" fill="#333">分辨率：固定（1920×1080）</text>
    <text x="20" y="210" font-size="12" fill="#333">帧率：30/60fps（固定）</text>
    <text x="20" y="235" font-size="12" fill="#333">延迟：10-50ms</text>
    <text x="20" y="260" font-size="12" fill="#333">CPU占用：低</text>
    
    <rect x="20" y="280" width="280" height="25" fill="#e8f5e9" rx="3"/>
    <text x="160" y="297" text-anchor="middle" font-size="12" fill="#2e7d32">适用：直播、视频会议</text>
  </g>
  
  <!-- Screen Capture -->
  <g transform="translate(430, 80)">
    <rect x="0" y="0" width="320" height="320" fill="#fff" stroke="#f0ad4e" stroke-width="2" rx="10"/>
    <text x="160" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#f0ad4e">屏幕采集</text>
    
    <!-- Monitor icon -->
    <rect x="70" y="60" width="180" height="110" fill="#fff3e0" stroke="#f0ad4e" stroke-width="2" rx="3"/>
    <rect x="80" y="70" width="160" height="90" fill="#f0ad4e" opacity="0.3"/>
    <text x="160" y="120" text-anchor="middle" font-size="14" fill="#e65100">屏幕内容</text>
    <rect x="140" y="170" width="40" height="15" fill="#f0ad4e"/>
    <rect x="110" y="185" width="100" height="8" fill="#f0ad4e" rx="2"/>
    
    <!-- Specs -->
    <text x="20" y="220" font-size="12" fill="#333">数据源：显卡帧缓冲</text>
    <text x="20" y="245" font-size="12" fill="#333">分辨率：随显示器变化（4K+）</text>
    <text x="20" y="270" font-size="12" fill="#333">帧率：与刷新率同步（60/144Hz）</text>
    <text x="20" y="295" font-size="12" fill="#d32f2f">⚠️ 数据量大（4K=12MB/帧）</text>
    
    <rect x="20" y="315" width="280" height="25" fill="#fff3e0" rx="3"/>
    <text x="160" y="332" text-anchor="middle" font-size="12" fill="#e65100">适用：游戏直播、在线教学</text>
  </g>
</svg>