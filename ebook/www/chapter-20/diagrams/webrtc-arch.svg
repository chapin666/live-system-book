<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <!-- Background -->
  <rect width="900" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">WebRTC 架构</text>
  
  
  <!-- WebRTC Box -->
  <g transform="translate(250, 60)">
    <rect width="400" height="300" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    
    
    <text x="200" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1565c0">WebRTC</text>
    
    
    <!-- Voice Engine -->
    
    <g transform="translate(30, 50)">
      <rect width="100" height="220" fill="#c8e6c9" stroke="#4caf50" stroke-width="1" rx="5"/>
      
      
      <text x="50" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">VoiceEngine</text>
      
      
      <text x="50" y="50" text-anchor="middle" font-size="9" fill="#333">音频采集</text>
      
      <text x="50" y="75" text-anchor="middle" font-size="9" fill="#333">3A处理</text>
      
      <text x="50" y="100" text-anchor="middle" font-size="9" fill="#333">Opus编码</text>
      
      <text x="50" y="125" text-anchor="middle" font-size="9" fill="#333">NetEQ</text>
      
      <text x="50" y="150" text-anchor="middle" font-size="9" fill="#333">音频播放</text>
      
      <text x="50" y="185" text-anchor="middle" font-size="9" fill="#2e7d32">AEC/ANS/AGC</text>
    </g>
    
    
    <!-- Video Engine -->
    
    <g transform="translate(150, 50)">
      <rect width="100" height="220" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
      
      
      <text x="50" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">VideoEngine</text>
      
      
      <text x="50" y="50" text-anchor="middle" font-size="9" fill="#333">视频采集</text>
      
      <text x="50" y="75" text-anchor="middle" font-size="9" fill="#333">图像处理</text>
      
      <text x="50" y="100" text-anchor="middle" font-size="9" fill="#333">VP8/H.264</text>
      
      <text x="50" y="125" text-anchor="middle" font-size="9" fill="#333">GCC拥塞控制</text>
      
      <text x="50" y="150" text-anchor="middle" font-size="9" fill="#333">视频渲染</text>
      
      <text x="50" y="185" text-anchor="middle" font-size="9" fill="#e65100">美颜/降噪</text>
    </g>
    
    
    <!-- Transport -->
    
    <g transform="translate(270, 50)">
      <rect width="100" height="220" fill="#fce4ec" stroke="#e91e63" stroke-width="1" rx="5"/>
      
      
      <text x="50" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2185b">Transport</text>
      
      
      <text x="50" y="50" text-anchor="middle" font-size="9" fill="#333">ICE</text>
      
      <text x="50" y="75" text-anchor="middle" font-size="9" fill="#333">STUN/TURN</text>
      
      <text x="50" y="100" text-anchor="middle" font-size="9" fill="#333">DTLS</text>
      
      <text x="50" y="125" text-anchor="middle" font-size="9" fill="#333">SRTP</text>
      
      <text x="50" y="150" text-anchor="middle" font-size="9" fill="#333">SCTP</text>
      
      <text x="50" y="185" text-anchor="middle" font-size="9" fill="#c2185b">DataChannel</text>
    </g>
  </g>
  
  
  <!-- Browser API -->
  <g transform="translate(250, 20)">
    <rect width="400" height="30" fill="#1565c0" rx="5"/>
    
    
    <text x="200" y="20" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">JavaScript API: getUserMedia | RTCPeerConnection | RTCDataChannel</text>
  </g>
  
  
  <!-- Left: Input Devices -->
  <g transform="translate(50, 100)">
    <rect width="150" height="200" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" rx="8"/>
    
    
    <text x="75" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#666">输入设备</text>
    
    
    <rect x="25" y="50" width="100" height="50" fill="#e0e0e0" rx="5"/>
    
    <text x="75" y="75" text-anchor="middle" font-size="10" fill="#333">摄像头</text>
    
    
    <rect x="25" y="120" width="100" height="50" fill="#e0e0e0" rx="5"/>
    
    <text x="75" y="145" text-anchor="middle" font-size="10" fill="#333">麦克风</text>
    
    
    <!-- Arrows -->
    
    <path d="M 200 125 L 280 125" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
    
    <path d="M 200 170 L 280 200" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  </g>
  
  
  <!-- Right: Output Devices -->
  <g transform="translate(700, 100)">
    <rect width="150" height="200" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" rx="8"/>
    
    
    <text x="75" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#666">输出设备</text>
    
    
    <rect x="25" y="50" width="100" height="50" fill="#e0e0e0" rx="5"/>
    
    <text x="75" y="75" text-anchor="middle" font-size="10" fill="#333">显示器</text>
    
    
    <rect x="25" y="120" width="100" height="50" fill="#e0e0e0" rx="5"/>
    
    <text x="75" y="145" text-anchor="middle" font-size="10" fill="#333">扬声器</text>
    
    
    <!-- Arrows -->
    
    <path d="M 650 125 L 700 125" stroke="#e91e63" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
    
    <path d="M 650 200 L 700 170" stroke="#e91e63" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
  </g>
  
  
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4caf50"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e91e63"/>
    </marker>
  </defs>
</svg>