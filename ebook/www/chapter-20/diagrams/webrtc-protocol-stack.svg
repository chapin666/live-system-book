<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">WebRTC 协议栈</text>
  
  
  <!-- Protocol Stack -->
  <g transform="translate(250, 60)">
    
    <!-- Application Layer -->
    
    <rect width="300" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    
    <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">应用层</text>
    
    <text x="150" y="40" text-anchor="middle" font-size="10" fill="#666">WebRTC API</text>
    
    
    <!-- Media Layer -->
    
    <g transform="translate(0, 55)">
      <rect width="300" height="60" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
      
      
      <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">媒体层</text>
      
      
      <g transform="translate(20, 30)">
        <rect width="80" height="20" fill="#ffe0b2" rx="3"/>
        
        <text x="40" y="14" text-anchor="middle" font-size="9" fill="#333">VP8/VP9</text>
      </g>
      
      
      <g transform="translate(110, 30)">
        <rect width="80" height="20" fill="#ffe0b2" rx="3"/>
        
        <text x="40" y="14" text-anchor="middle" font-size="9" fill="#333">H.264</text>
      </g>
      
      
      <g transform="translate(200, 30)">
        <rect width="80" height="20" fill="#ffe0b2" rx="3"/>
        
        <text x="40" y="14" text-anchor="middle" font-size="9" fill="#333">Opus</text>
      </g>
    </g>
    
    
    <!-- Transport Layer 1 -->
    
    <g transform="translate(0, 120)">
      <rect width="300" height="60" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5"/>
      
      
      <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">传输层</text>
      
      
      <g transform="translate(30, 32)">
        <rect width="60" height="20" fill="#c8e6c9" rx="3"/>
        
        <text x="30" y="14" text-anchor="middle" font-size="9" fill="#333">SRTP</text>
      </g>
      
      
      <g transform="translate(100, 32)">
        <rect width="60" height="20" fill="#c8e6c9" rx="3"/>
        
        <text x="30" y="14" text-anchor="middle" font-size="9" fill="#333">SCTP</text>
      </g>
      
      
      <g transform="translate(170, 32)">
        <rect width="100" height="20" fill="#c8e6c9" rx="3"/>
        
        <text x="50" y="14" text-anchor="middle" font-size="9" fill="#333">DTLS</text>
      </g>
    </g>
    
    
    <!-- ICE Layer -->
    
    <g transform="translate(0, 185)">
      <rect width="300" height="50" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="5"/>
      
      
      <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#c2185b">ICE 层</text>
      
      
      <text x="150" y="40" text-anchor="middle" font-size="10" fill="#666">STUN / TURN / ICE Candidate</text>
    </g>
    
    
    <!-- UDP Layer -->
    
    <g transform="translate(0, 240)">
      <rect width="300" height="40" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
      
      
      <text x="150" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#7b1fa2">UDP</text>
    </g>
    
    
    <!-- IP Layer -->
    
    <g transform="translate(0, 285)">
      <rect width="300" height="40" fill="#e0e0e0" stroke="#757575" stroke-width="2" rx="5"/>
      
      
      <text x="150" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#424242">IP</text>
    </g>
    
    
    <!-- Physical Layer -->
    
    <g transform="translate(0, 330)">
      <rect width="300" height="40" fill="#d7ccc8" stroke="#5d4037" stroke-width="2" rx="5"/>
      
      
      <text x="150" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#3e2723">物理层</text>
    </g>
  </g>
  
  
  <!-- Legend -->
  <g transform="translate(580, 100)">
    <rect width="200" height="200" fill="#fff" stroke="#ddd" stroke-width="1" rx="8"/>
    
    
    <text x="100" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">关键协议说明</text>
    
    
    <text x="15" y="55" font-size="10" fill="#333">• SRTP: 安全实时传输</text>
    
    <text x="15" y="80" font-size="10" fill="#333">• SCTP: 流控制传输</text>
    
    <text x="15" y="105" font-size="10" fill="#333">• DTLS: 数据报TLS</text>
    
    <text x="15" y="130" font-size="10" fill="#333">• ICE: 连接建立框架</text>
    
    <text x="15" y="155" font-size="10" fill="#333">• STUN: 公网地址发现</text>
    
    <text x="15" y="180" font-size="10" fill="#333">• TURN: 中继转发</text>
  </g>
</svg>