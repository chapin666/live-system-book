<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e0" stroke-width="1"/>
    </pattern>
    <linearGradient id="ygrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">YUV420P 内存布局 (1920×1080)</text>
  
  <!-- Y 平面 -->
  <rect x="50" y="50" width="600" height="100" fill="url(#grid)" stroke="#333" stroke-width="2"/>
  <rect x="50" y="50" width="600" height="100" fill="url(#ygrad)" opacity="0.7"/>
  <text x="350" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Y 平面 (亮度)</text>
  <text x="350" y="130" text-anchor="middle" font-size="12" fill="#555">1920 × 1080 = 2,073,600 字节</text>
  
  <!-- 说明 -->
  <text x="680" y="90" font-size="11" fill="#666">每个像素</text>
  <text x="680" y="105" font-size="11" fill="#666">1 字节</text>
  <text x="680" y="125" font-size="11" fill="#666">表示灰度</text>
  
  <!-- U 平面 -->
  <rect x="50" y="180" width="300" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="200" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">U 平面 (色度)</text>
  <text x="200" y="250" text-anchor="middle" font-size="11" fill="#555">960 × 540 = 518,400 字节</text>
  
  <!-- V 平面 -->
  <rect x="50" y="300" width="300" height="100" fill="#fce4ec" stroke="#c2185b" stroke-width="2"/>
  <text x="200" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#ad1457">V 平面 (色度)</text>
  <text x="200" y="370" text-anchor="middle" font-size="11" fill="#555">960 × 540 = 518,400 字节</text>
  
  <!-- 采样示意 -->
  <rect x="400" y="180" width="250" height="220" fill="#fff" stroke="#ddd" stroke-width="1" rx="8"/>
  <text x="525" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">4:2:0 采样示意</text>
  
  <!-- 4x4 像素块 -->
  <g transform="translate(450, 230)">
    <!-- Y 4x4 -->
    <rect x="0" y="0" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    <rect x="20" y="0" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    <rect x="40" y="0" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    <rect x="60" y="0" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    
    <rect x="0" y="20" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    <rect x="20" y="20" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    <rect x="40" y="20" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    <rect x="60" y="20" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    
    <rect x="0" y="40" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    <rect x="20" y="40" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    <rect x="40" y="40" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    <rect x="60" y="40" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    
    <rect x="0" y="60" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    <rect x="20" y="60" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    <rect x="40" y="60" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    <rect x="60" y="60" width="20" height="20" fill="#ddd" stroke="#666" stroke-width="1"/>
    
    <text x="30" y="95" text-anchor="middle" font-size="10" fill="#666">4×4 Y 值</text>
  </g>
  
  <!-- UV 2x2 -->
  <g transform="translate(450, 330)">
    <rect x="0" y="0" width="40" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <rect x="50" y="0" width="40" height="40" fill="#fce4ec" stroke="#c2185b" stroke-width="2"/>
    
    <text x="20" y="55" text-anchor="middle" font-size="10" fill="#1565c0">1个U</text>
    <text x="70" y="55" text-anchor="middle" font-size="10" fill="#ad1457">1个V</text>
  </g>
  
  <!-- 说明文字 -->
  <text x="400" y="400" font-size="10" fill="#666">每 4 个 Y 像素共享 1 个 U 和 1 个 V</text>
  
  <!-- 总计 -->
  <rect x="50" y="430" width="600" height="50" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="350" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">总计: 2,073,600 + 518,400 + 518,400 = 3,110,400 字节 (比 RGB 节省 50%)</text>
</svg>