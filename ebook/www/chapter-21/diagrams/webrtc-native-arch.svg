<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="internalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="systemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#333">
    WebRTC Native Architecture
  </text>
  
  <!-- Application Layer -->
  <rect x="50" y="50" width="700" height="100" rx="8" fill="url(#appGrad)" stroke="#4a90d9" stroke-width="2"/>
  <text x="400" y="75" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">
    Application Layer (Your Code)
  </text>
  
  <rect x="80" y="85" width="180" height="50" rx="4" fill="white" stroke="#4a90d9" stroke-width="1"/>
  <text x="170" y="105" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">PeerConnection</text>
  <text x="170" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Observer</text>
  
  <rect x="300" y="85" width="180" height="50" rx="4" fill="white" stroke="#4a90d9" stroke-width="1"/>
  <text x="390" y="105" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">AudioTrack</text>
  <text x="390" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Source</text>
  
  <rect x="520" y="85" width="180" height="50" rx="4" fill="white" stroke="#4a90d9" stroke-width="1"/>
  <text x="610" y="105" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">VideoTrack</text>
  <text x="610" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Source</text>
  
  <!-- WebRTC API Layer -->
  <rect x="50" y="160" width="700" height="100" rx="8" fill="url(#apiGrad)" stroke="#f0ad4e" stroke-width="2"/>
  <text x="400" y="185" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">
    WebRTC API Layer (libwebrtc)
  </text>
  
  <rect x="80" y="195" width="200" height="50" rx="4" fill="white" stroke="#f0ad4e" stroke-width="1"/>
  <text x="180" y="215" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">PeerConnectionFactory</text>
  <text x="180" y="230" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Create PC, Tracks</text>
  
  <rect x="320" y="195" width="200" height="50" rx="4" fill="white" stroke="#f0ad4e" stroke-width="1"/>
  <text x="420" y="215" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Audio Engine</text>
  <text x="420" y="230" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Capture, 3A, Codec</text>
  
  <rect x="560" y="195" width="170" height="50" rx="4" fill="white" stroke="#f0ad4e" stroke-width="1"/>
  <text x="645" y="215" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Video Engine</text>
  <text x="645" y="230" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Capture, Codec</text>
  
  <!-- Internal Modules -->
  <rect x="50" y="270" width="700" height="100" rx="8" fill="url(#internalGrad)" stroke="#5cb85c" stroke-width="2"/>
  <text x="400" y="295" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32">
    WebRTC Internal Modules
  </text>
  
  <rect x="80" y="305" width="140" height="50" rx="4" fill="white" stroke="#5cb85c" stroke-width="1"/>
  <text x="150" y="325" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">ICE Agent</text>
  <text x="150" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">STUN/TURN</text>
  
  <rect x="250" y="305" width="140" height="50" rx="4" fill="white" stroke="#5cb85c" stroke-width="1"/>
  <text x="320" y="325" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">DTLS Client</text>
  <text x="320" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Key Exchange</text>
  
  <rect x="420" y="305" width="140" height="50" rx="4" fill="white" stroke="#5cb85c" stroke-width="1"/>
  <text x="490" y="325" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">SRTP Session</text>
  <text x="490" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Encrypt/Decrypt</text>
  
  <rect x="590" y="305" width="140" height="50" rx="4" fill="white" stroke="#5cb85c" stroke-width="1"/>
  <text x="660" y="325" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Network Thread</text>
  <text x="660" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Socket I/O</text>
  
  <!-- System Layer -->
  <rect x="50" y="380" width="700" height="100" rx="8" fill="url(#systemGrad)" stroke="#e91e63" stroke-width="2"/>
  <text x="400" y="405" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#c2185b">
    System Layer
  </text>
  
  <rect x="80" y="415" width="140" height="50" rx="4" fill="white" stroke="#e91e63" stroke-width="1"/>
  <text x="150" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Socket API</text>
  <text x="150" y="450" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">UDP/TCP</text>
  
  <rect x="250" y="415" width="140" height="50" rx="4" fill="white" stroke="#e91e63" stroke-width="1"/>
  <text x="320" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Audio System</text>
  <text x="320" y="450" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">ALSA/CoreAudio</text>
  
  <rect x="420" y="415" width="140" height="50" rx="4" fill="white" stroke="#e91e63" stroke-width="1"/>
  <text x="490" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Camera Capture</text>
  <text x="490" y="450" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">V4L2/AVFoundation</text>
  
  <rect x="590" y="415" width="140" height="50" rx="4" fill="white" stroke="#e91e63" stroke-width="1"/>
  <text x="660" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">GPU Encoder</text>
  <text x="660" y="450" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">NVENC/VA-API</text>
  
  <!-- Arrows between layers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Data flow arrows -->
  <line x1="400" y1="150" x2="400" y2="160" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="260" x2="400" y2="270" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="370" x2="400" y2="380" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Legend -->
  <rect x="50" y="510" width="700" height="70" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="70" y="530" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Key Concepts:</text>
  <text x="70" y="550" font-family="Arial" font-size="11" fill="#666">
    • Your application uses the WebRTC API layer to create PeerConnections and media tracks
  </text>
  <text x="70" y="570" font-family="Arial" font-size="11" fill="#666">
    • Internal modules handle ICE, DTLS, SRTP automatically based on standard protocols
  </text>
</svg>
