<svg viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="280" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="300" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">3 人 P2P 通话：Alice 的上行带宽爆炸</text>
  
  <!-- Alice -->
  <circle cx="300" cy="140" r="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="300" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Alice</text>
  <text x="300" y="165" text-anchor="middle" font-size="10" fill="#666">2 Mbps</text>
  
  <!-- Bob -->
  <circle cx="150" cy="80" r="35" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="150" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Bob</text>
  
  <!-- Charlie -->
  <circle cx="150" cy="200" r="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="150" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Charlie</text>
  
  <!-- Arrows from Alice -->
  <line x1="265" y1="115" x2="180" y2="90" stroke="#f44336" stroke-width="3" marker-end="url(#arrowred)"/>
  <line x1="265" y1="165" x2="180" y2="190" stroke="#f44336" stroke-width="3" marker-end="url(#arrowred)"/>
  
  <!-- Bandwidth labels -->
  <rect x="210" y="85" width="70" height="20" rx="3" fill="#ffebee" stroke="#f44336"/>
  <text x="245" y="99" text-anchor="middle" font-size="10" fill="#c62828">2 Mbps ↑</text>
  
  <rect x="210" y="175" width="70" height="20" rx="3" fill="#ffebee" stroke="#f44336"/>
  <text x="245" y="189" text-anchor="middle" font-size="10" fill="#c62828">2 Mbps ↑</text>
  
  <!-- Stats box -->
  <rect x="420" y="70" width="160" height="140" rx="8" fill="#fff" stroke="#ddd" stroke-width="2"/>
  <text x="500" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">带宽统计</text>
  
  <text x="435" y="120" font-size="11" fill="#666">Alice 上行：</text>
  <text x="550" y="120" text-anchor="end" font-size="11" font-weight="bold" fill="#f44336">4 Mbps</text>
  
  <text x="435" y="140" font-size="11" fill="#666">Alice 下行：</text>
  <text x="550" y="140" text-anchor="end" font-size="11" font-weight="bold" fill="#f44336">4 Mbps</text>
  
  <text x="435" y="165" font-size="11" fill="#666">每人总消耗：</text>
  <text x="550" y="165" text-anchor="end" font-size="12" font-weight="bold" fill="#d32f2f">8 Mbps</text>
  
  <line x1="435" y1="180" x2="565" y2="180" stroke="#eee" stroke-width="1"/>
  
  <text x="435" y="200" font-size="10" fill="#999">N 人通话每人：</text>
  <text x="500" y="215" text-anchor="middle" font-size="11" fill="#666">(N-1) × 2Mbps 上行</text>
  <text x="500" y="230" text-anchor="middle" font-size="11" fill="#666">(N-1) × 2Mbps 下行</text>
  
  <!-- Warning -->
  <rect x="380" y="240" width="200" height="30" rx="4" fill="#ffebee" stroke="#f44336"/>
  <text x="480" y="260" text-anchor="middle" font-size="12" fill="#c62828">⚠️ 随人数线性增长！</text>
  
  <!-- Arrow Marker -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
    </marker>
  </defs>
</svg>